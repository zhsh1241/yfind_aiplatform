apiVersion: apps/v1
kind: Deployment
metadata:
  name: smp-frontend
  labels:
    app.kubernetes.io/name: smp-frontend
spec:
  replicas: {{ .Values.frontend.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: smp-frontend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: smp-frontend
    spec:
      containers:
        - name: smp-frontend
          image: {{ .Values.frontend.image | quote }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - containerPort: {{ .Values.frontend.service.port }}
          readinessProbe:
            httpGet:
              path: /
              port: {{ .Values.frontend.service.port }}
          livenessProbe:
            httpGet:
              path: /
              port: {{ .Values.frontend.service.port }}
---
apiVersion: v1
kind: Service
metadata:
  name: smp-frontend
spec:
  selector:
    app.kubernetes.io/name: smp-frontend
  ports:
    - port: {{ .Values.frontend.service.port }}
      targetPort: {{ .Values.frontend.service.port }}
