services:
  postgres:
    image: postgres:16
    container_name: yfind-aiplatform-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-yfind_aiplatform}
      POSTGRES_USER: ${POSTGRES_USER:-yfind}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-yfind_local_password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - yfind_aiplatform_pgdata:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  yfind_aiplatform_pgdata:
