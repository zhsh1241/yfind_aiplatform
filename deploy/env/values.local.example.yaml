global:
  imageRegistry: TODO_CONFIRM_IMAGE_REGISTRY
  imagePullSecrets: []

backend:
  image:
    repository: TODO_CONFIRM_IMAGE_REGISTRY/yfind-aiplatform-backend
    tag: 0.1.0-SNAPSHOT
  env:
    SPRING_PROFILES_ACTIVE: local
    AI_ADAPTER_BASE_URL: http://TODO_CONFIRM_AI_ADAPTER_SERVICE:8000
    POSTGRES_HOST: TODO_CONFIRM_POSTGRES_HOST
    POSTGRES_DB: TODO_CONFIRM_POSTGRES_DB
    REDIS_HOST: TODO_CONFIRM_REDIS_HOST
    OBJECT_STORAGE_ENDPOINT: TODO_CONFIRM_OBJECT_STORAGE_ENDPOINT

aiAdapter:
  image:
    repository: TODO_CONFIRM_IMAGE_REGISTRY/yfind-aiplatform-ai-adapter
    tag: 0.1.0-SNAPSHOT
  env:
    AI_ADAPTER_LABEL_STUDIO_URL: TODO_CONFIRM_LABEL_STUDIO_URL
    AI_ADAPTER_MLFLOW_URL: TODO_CONFIRM_MLFLOW_URL
    AI_ADAPTER_WORKFLOW_ENGINE_URL: TODO_CONFIRM_WORKFLOW_ENGINE_URL
    AI_ADAPTER_KSERVE_URL: TODO_CONFIRM_KSERVE_URL
    AI_ADAPTER_OBJECT_STORAGE_ENDPOINT: TODO_CONFIRM_OBJECT_STORAGE_ENDPOINT

frontend:
  image:
    repository: TODO_CONFIRM_IMAGE_REGISTRY/yfind-aiplatform-frontend
    tag: 0.1.0-SNAPSHOT

ingress:
  enabled: false
  host: TODO_CONFIRM_PLATFORM_HOST
