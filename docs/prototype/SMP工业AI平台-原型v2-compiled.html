<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1440">
<title>SMP 工业AI小模型平台 · 交互原型 v1</title>
<script src="https://unpkg.com/react@18.2.0/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.development.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body,#root{height:100%}
body{font-family:'PingFang SC','Microsoft YaHei','Helvetica Neue',sans-serif;background:#F2F4F8;color:#161616;-webkit-font-smoothing:antialiased}
:root{
  /* IBM Carbon Light — content area */
  --bg-base:#FFFFFF;--bg-nav:#21272A;--bg-surface:#F2F4F8;--bg-card:#FFFFFF;--bg-hover:#E8EDF3;
  --border:#E0E0E0;--border-hi:rgba(15,98,254,0.35);
  --blue:#0F62FE;--blue-s:rgba(15,98,254,0.10);--blue-l:#0F62FE;
  --orange:#D4420A;--green:#198038;--yellow:#B45309;--red:#DA1E28;--purple:#6929C4;
  --t1:#161616;--t2:#525252;--t3:#8D8D8D;
  /* aliases used in newer components */
  --fg:#161616;--fg-dim:#525252;
  --r:8px;--rl:12px;--rs:4px;--sw:220px;--sh:56px;
  --shadow:0 2px 8px rgba(0,0,0,0.12);
  /* legacy aliases used in newer screens */
  --text-main:#161616;--text-sec:#525252;--bg-main:#F2F4F8
}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--t3);border-radius:3px}
.app{display:flex;height:100vh;overflow:hidden}

/* SIDEBAR */
.sb{width:var(--sw);background:var(--bg-nav);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto}
.sb-logo{height:var(--sh);display:flex;align-items:center;padding:0 16px;border-bottom:1px solid var(--border);gap:10px;flex-shrink:0}
.logo-mark{width:32px;height:32px;background:var(--blue);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:900;color:#fff;letter-spacing:-1px}
.logo-txt{font-size:14px;font-weight:700;color:var(--t1)}
.logo-sub{font-size:9px;color:var(--t3);letter-spacing:.08em;margin-top:1px}
.nav-sec{padding:6px 0}
/* Sidebar always dark — hardcode light text regardless of theme */
.logo-txt{color:#F4F4F4!important}
.logo-sub{color:#6F6F6F!important}
.nav-lbl{padding:8px 16px 3px;font-size:9px;font-weight:700;color:#6F6F6F;letter-spacing:.12em;text-transform:uppercase;display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none;transition:color .15s}
.nav-lbl:hover{color:#A8A8A8}
.sec-chev{font-size:8px;opacity:.7;margin-right:4px;transition:transform .2s}
.nav-item{display:flex;align-items:center;padding:8px 16px;gap:9px;cursor:pointer;color:#C6C6C6;font-size:12.5px;transition:all .15s;position:relative;white-space:nowrap;overflow:hidden}
.nav-item:hover{background:rgba(255,255,255,.06);color:#F4F4F4}
.nav-item.on{background:rgba(15,98,254,.22);color:#78A9FF}
.nav-item.on::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:#4589FF;border-radius:0 2px 2px 0}
.nav-item.dim{opacity:.28;cursor:default}
.ni{font-size:14px;width:16px;text-align:center;flex-shrink:0}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.hdr{height:var(--sh);background:var(--bg-card);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px;gap:12px;flex-shrink:0}
.hdr-bc{font-size:11px;color:var(--t3);cursor:pointer;transition:color .15s}
.hdr-bc:hover{color:var(--t2)}
.hdr-sep{color:var(--t3);font-size:11px;margin:0 4px}
.hdr-title{font-size:15px;font-weight:700;color:var(--t1)}
.hdr-right{display:flex;align-items:center;gap:10px;margin-left:auto}
.hdr-btn{width:30px;height:30px;border-radius:var(--rs);background:transparent;border:1px solid var(--border);color:var(--t2);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px;transition:all .15s;position:relative}
.hdr-btn:hover{background:var(--bg-hover);color:var(--t1)}
.notif-dot{position:absolute;top:5px;right:5px;width:5px;height:5px;border-radius:50%;background:var(--red)}
.avatar{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,#0F62FE,#0043CE);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;cursor:pointer}
.srchbox{display:flex;align-items:center;gap:7px;padding:6px 11px;background:var(--bg-base);border:1px solid var(--border);border-radius:var(--rs);color:var(--t2);font-size:12px;width:200px}
.srchbox input{background:none;border:none;outline:none;color:var(--t1);font-size:12px;width:100%}
.srchbox input::placeholder{color:var(--t3)}

/* CONTENT */
.content{flex:1;overflow-y:auto;padding:24px}
.ph{margin-bottom:20px}
.pt{font-size:19px;font-weight:800;color:var(--t1);margin-bottom:3px;letter-spacing:-.3px}
.ps{font-size:12px;color:var(--t2)}
.card{background:var(--bg-surface);border:1px solid var(--border);border-radius:var(--rl);padding:18px}
.ctitle{font-size:12px;font-weight:600;color:var(--t2);margin-bottom:14px;display:flex;align-items:center;gap:5px}

/* GRIDS */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.g5{display:grid;grid-template-columns:repeat(5,1fr);gap:10px}

/* DOMAIN CARDS */
.dc{background:var(--bg-surface);border:1px solid var(--border);border-radius:var(--rl);padding:18px 14px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden}
.dc:hover{border-color:var(--border-hi);transform:translateY(-2px);box-shadow:var(--shadow)}
.dc .di{font-size:26px;margin-bottom:10px;display:block}
.dc .dn{font-size:12.5px;font-weight:700;color:var(--t1);margin-bottom:2px}
.dc .de{font-size:9px;color:var(--t3);letter-spacing:.1em;text-transform:uppercase;margin-bottom:7px}
.dc .dv{font-size:21px;font-weight:900}
.dc .du{font-size:10px;color:var(--t2);margin-left:3px}
.dc .dd{font-size:10px;color:var(--t3);margin-top:5px}

/* STAT MATRIX */
.mtrx{display:grid;grid-template-columns:130px repeat(3,1fr);gap:1px;background:var(--border);border-radius:var(--r);overflow:hidden}
.mc{background:var(--bg-surface);padding:9px 12px}
.mc.hd{font-size:10px;color:var(--t3);font-weight:600;text-align:center}
.mc.lbl{font-size:11.5px;color:var(--t2)}
.sn{display:inline-flex;align-items:center;padding:2px 7px;border-radius:99px;font-size:11px;font-weight:700;white-space:nowrap}
.sn.r{background:rgba(25,128,56,.12);color:var(--green)}
.sn.d{background:rgba(15,98,254,.12);color:var(--blue)}
.sn.f{background:rgba(218,30,40,.12);color:var(--red)}

/* RESOURCE BARS */
.rb{margin-bottom:12px}
.rb:last-child{margin-bottom:0}
.rbl{display:flex;justify-content:space-between;margin-bottom:5px;font-size:11px}
.rbl span{color:var(--t2)}
.rbl strong{color:var(--t1)}
.rt{height:5px;background:var(--bg-hover);border-radius:99px;overflow:hidden}
.rf{height:100%;border-radius:99px;transition:width .5s}
.rf.n{background:var(--blue)}.rf.w{background:var(--yellow)}.rf.x{background:var(--red)}

/* TABLE */
.tbl{width:100%;border-collapse:collapse}
.tbl th{text-align:left;font-size:10px;font-weight:700;color:var(--t3);padding:9px 16px;border-bottom:1px solid var(--border);letter-spacing:.06em;text-transform:uppercase;white-space:nowrap}
.tbl td{padding:11px 16px;font-size:12.5px;color:var(--t1);border-bottom:1px solid var(--border)}
.tbl tr:last-child td{border-bottom:none}
.tbl tbody tr:hover td{background:rgba(0,0,0,.025)}

/* BADGES */
.bs{display:inline-flex;align-items:center;gap:4px;padding:2px 7px;border-radius:99px;font-size:10.5px;font-weight:600;white-space:nowrap}
.bs::before{content:'';width:5px;height:5px;border-radius:50%}
.bs.act{background:rgba(25,128,56,.1);color:var(--green)}.bs.act::before{background:var(--green)}
.bs.pnd{background:rgba(180,83,9,.1);color:var(--yellow)}.bs.pnd::before{background:var(--yellow)}
.bs.arc{background:rgba(141,141,141,.18);color:var(--t2)}.bs.arc::before{background:var(--t3)}
.bs.run{background:rgba(15,98,254,.1);color:var(--blue)}.bs.run::before{background:var(--blue);box-shadow:0 0 5px rgba(15,98,254,.4)}
.bs.fail{background:rgba(218,30,40,.1);color:var(--red)}.bs.fail::before{background:var(--red)}
.bs.stop{background:rgba(141,141,141,.18);color:var(--t2)}.bs.stop::before{background:var(--t3)}
.bs.ab{background:rgba(212,66,10,.1);color:var(--orange)}.bs.ab::before{background:var(--orange)}
.bs.crit{background:rgba(218,30,40,.1);color:var(--red)}.bs.crit::before{background:var(--red)}
.bs.info{background:rgba(15,98,254,.1);color:var(--blue)}.bs.info::before{background:var(--blue)}
.bp{display:inline-block;padding:2px 5px;border-radius:3px;font-size:10px;font-weight:700;letter-spacing:.04em}
.bp.pub{background:rgba(25,128,56,.12);color:var(--green)}
.bp.int{background:rgba(15,98,254,.12);color:var(--blue)}
.bp.con{background:rgba(180,83,9,.12);color:var(--yellow)}
.bp.res{background:rgba(218,30,40,.12);color:var(--red)}
.tt{display:inline-flex;align-items:center;gap:3px;padding:2px 7px;border-radius:var(--rs);font-size:11px;font-weight:500;background:var(--bg-hover);color:var(--t2)}

/* BUTTONS */
.btn-p{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;background:var(--blue);color:#fff;border:none;border-radius:var(--rs);font-size:12.5px;font-weight:600;cursor:pointer;transition:all .15s}
.btn-p:hover{background:#1555d6;transform:translateY(-1px);box-shadow:0 4px 12px rgba(26,107,255,.4)}
.btn-s{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;background:transparent;color:var(--t2);border:1px solid #C6C6C6;border-radius:var(--rs);font-size:12.5px;font-weight:600;cursor:pointer;transition:all .15s}
.btn-s:hover{background:var(--bg-hover);color:var(--t1);border-color:#A8A8A8}
/* aliases used by later screens */
.btn-pri{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;background:var(--blue);color:#fff;border:none;border-radius:var(--rs);font-size:12.5px;font-weight:600;cursor:pointer;transition:all .15s}
.btn-pri:hover{background:#1555d6;transform:translateY(-1px);box-shadow:0 4px 12px rgba(26,107,255,.4)}
.btn-sec{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;background:transparent;color:var(--t2);border:1px solid #C6C6C6;border-radius:var(--rs);font-size:12.5px;font-weight:600;cursor:pointer;transition:all .15s}
.btn-sec:hover{background:var(--bg-hover);color:var(--t1);border-color:#A8A8A8}
/* reusable card shell */
.card-plain{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--r)}
.al{display:inline-flex;align-items:center;padding:3px 8px;border-radius:var(--rs);font-size:11.5px;color:var(--t2);cursor:pointer;border:1px solid transparent;transition:all .15s}
.al:hover{background:var(--bg-hover);border-color:var(--border)}
.al.p{color:var(--blue-l)}.al.p:hover{background:var(--blue-s);border-color:var(--border-hi)}
.al.d:hover{background:rgba(255,71,87,.1);color:var(--red);border-color:rgba(255,71,87,.3)}

/* TOOLBAR */
.tb{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.fsel{padding:6px 10px;background:var(--bg-surface);border:1px solid var(--border);border-radius:var(--rs);color:var(--t2);font-size:11.5px;cursor:pointer}

/* PROGRESS */
.pb{height:4px;background:var(--bg-hover);border-radius:99px;overflow:hidden;width:80px}
.pf{height:100%;background:var(--blue);border-radius:99px}

/* WIZARD */
.wiz{display:flex;align-items:center;gap:0;margin-bottom:28px}
.wiz-s{display:flex;align-items:center;gap:8px;flex:1}
.wiz-s:last-child{flex:none}
.sc{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;background:var(--bg-hover);color:var(--t3);border:2px solid var(--border);transition:all .3s}
.sc.on{background:var(--blue);color:#fff;border-color:var(--blue);box-shadow:0 0 10px rgba(26,107,255,.5)}
.sc.ok{background:var(--green);color:#fff;border-color:var(--green)}
.sl{font-size:11.5px;color:var(--t2);white-space:nowrap}
.sl.on{color:var(--t1);font-weight:600}
.scon{flex:1;height:2px;background:var(--border);margin:0 6px}
.scon.ok{background:var(--green)}

/* FORM */
.fg{margin-bottom:16px}
.fl{font-size:11.5px;font-weight:600;color:var(--t2);margin-bottom:5px;display:block}
.fl .req{color:var(--red);margin-left:2px}
.fi{width:100%;padding:8px 11px;background:var(--bg-base);border:1px solid var(--border);border-radius:var(--rs);color:var(--t1);font-size:12.5px;transition:border-color .15s}
.fi:focus{outline:none;border-color:var(--blue)}
.fi::placeholder{color:var(--t3)}
.fsel2{width:100%;padding:8px 11px;background:var(--bg-base);border:1px solid var(--border);border-radius:var(--rs);color:var(--t1);font-size:12.5px;cursor:pointer}

/* UPLOAD ZONE */
.uz{border:2px dashed var(--border-hi);border-radius:var(--rl);padding:44px 28px;text-align:center;background:var(--blue-s);cursor:pointer;transition:all .2s}
.uz:hover{border-color:var(--blue);background:rgba(26,107,255,.18)}
.ui-icon{font-size:44px;margin-bottom:14px;display:block;opacity:.7}

/* TREE */
.tn{display:flex;align-items:center;gap:7px;padding:7px 10px;border-radius:var(--rs);cursor:pointer;font-size:12px;color:var(--t2);transition:all .15s}
.tn:hover{background:var(--bg-hover);color:var(--t1)}
.tn.sel{background:var(--blue-s);color:var(--blue-l)}
.tc{padding-left:22px}

/* TABS */
.tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:16px}
.tab{padding:9px 18px;font-size:12.5px;font-weight:500;color:var(--t2);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;white-space:nowrap}
.tab:hover{color:var(--t1)}
.tab.on{color:var(--blue-l);border-bottom-color:var(--blue)}

/* PERM MATRIX */
.pm{width:100%;border-collapse:collapse}
.pm th,.pm td{padding:9px 12px;font-size:11.5px;border-bottom:1px solid var(--border);text-align:left}
.pm th{color:var(--t3);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em}
.pm tbody tr:hover td{background:rgba(0,0,0,.02)}
.cb{width:16px;height:16px;border:2px solid var(--border-hi);border-radius:3px;display:inline-flex;align-items:center;justify-content:center;font-size:9px;color:#fff;transition:all .15s;cursor:pointer;margin:auto}
.cb.on{background:var(--blue);border-color:var(--blue)}

/* ANNOTATOR CHIP */
.ac{display:inline-flex;align-items:center;gap:3px;padding:2px 6px 2px 3px;background:var(--bg-hover);border-radius:99px;font-size:10.5px;color:var(--t2)}
.ma{width:14px;height:14px;border-radius:50%;background:linear-gradient(135deg,var(--purple),var(--blue));font-size:8px;color:#fff;font-weight:700;display:flex;align-items:center;justify-content:center}

/* MISC */
.row{display:flex;align-items:center;gap:16px}
.smr{display:flex;gap:20px;padding:14px 18px;background:var(--bg-surface);border-radius:var(--r);border:1px solid var(--border);margin-bottom:14px}
.si{text-align:center}
.sn2{font-size:22px;font-weight:800;color:var(--t1)}
.slb{font-size:10px;color:var(--t3);margin-top:2px}
.g2i{display:grid;grid-template-columns:1fr 300px;gap:14px}
.g2t{display:grid;grid-template-columns:260px 1fr;gap:14px}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>

<div id="root"></div>
