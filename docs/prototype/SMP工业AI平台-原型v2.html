          <div style={{padding:'13px 18px',borderTop:'1px solid var(--border)',display:'flex',gap:8,flexShrink:0}}>
            <button className="btn-pri" style={{flex:1,justifyContent:'center',fontSize:12}} onClick={()=>{setDeployForm({name:(sel||'').toLowerCase().replace(/[^a-z0-9]/g,'-')+'-svc',replicas:'2',resource:'GPU-small (T4)'});setDeployDone(false);setDeployOpen(true);}}>部署为推理服务</button>
            <button className="btn-sec" style={{flex:1,justifyContent:'center',fontSize:12}} onClick={()=>{setTuneStep(0);setTuneDone(false);setTuneForm({ds:'焊缝缺陷检测数据集 V2',lr:'1e-4',epochs:'20',freeze:'0',gpu:'2'});setTuneOpen(true);}}>🔧 一键调优</button>
            <button onClick={()=>toggleLike(sel)} className="btn-sec" style={{fontSize:12,padding:'7px 12px',gap:4,minWidth:64}}>
              {liked.has(sel)?'❤️':'🤍'} {selM.stars+(liked.has(sel)?1:0)}
            </button>
          </div>
        </div>
      )}
      {/* ── Hub: 对比底栏 ── */}
      {compareSet.size>0&&(
        <div style={{position:'fixed',bottom:24,left:'50%',transform:'translateX(-50%)',background:'#21272A',color:'#fff',borderRadius:8,padding:'12px 20px',display:'flex',gap:12,alignItems:'center',zIndex:600,boxShadow:'0 8px 24px rgba(0,0,0,.3)'}}>
          <span style={{fontSize:13}}>已选 {compareSet.size}/2 个模型</span>
          {compareSet.size===2&&<button onClick={()=>setCompareOpen(true)} style={{padding:'5px 16px',background:'var(--blue)',color:'#fff',border:'none',borderRadius:6,fontSize:12,cursor:'pointer',fontWeight:600}}>对比所选模型 →</button>}
          <button onClick={()=>setCompareSet(new Set())} style={{padding:'5px 12px',background:'transparent',color:'#aaa',border:'1px solid rgba(255,255,255,.2)',borderRadius:6,fontSize:12,cursor:'pointer'}}>清除</button>
        </div>
      )}
      {/* ── Hub: 对比弹窗 ── */}
      {compareOpen&&compareSet.size===2&&(()=>{
        const names=[...compareSet];
        const cmpData={
          'ResNet-50':{'mAP@0.5':'94.1%','召回率':'83.2%','精确率':'91.5%','推理时延':'32ms','模型大小':'98 MB','版本':'v3.2','更新日期':'2024-03-15'},
          'YOLOv8-Crack':{'mAP@0.5':'91.3%','召回率':'86.4%','精确率':'82.1%','推理时延':'18ms','模型大小':'43 MB','版本':'v1.1','更新日期':'2024-02-28'},
          'EfficientNet-B4':{'mAP@0.5':'83.1%','召回率':'81.5%','精确率':'84.3%','推理时延':'12ms','模型大小':'19 MB','版本':'v2.0','更新日期':'2024-01-20'},
          'SegFormer-Defect':{'mAP@0.5':'87.3%','召回率':'82.1%','精确率':'89.7%','推理时延':'48ms','模型大小':'256 MB','版本':'v0.9','更新日期':'2024-03-01'},
          'CLIP-Industrial':{'mAP@0.5':'89.7%','召回率':'84.0%','精确率':'88.2%','推理时延':'26ms','模型大小':'340 MB','版本':'v1.0','更新日期':'2024-03-10'},
          'TimeSformer-QA':{'mAP@0.5':'78.2%','召回率':'75.8%','精确率':'79.1%','推理时延':'45ms','模型大小':'180 MB','版本':'v0.5','更新日期':'2024-02-10'},
          'BERT-Industrial':{'mAP@0.5':'85.6%','召回率':'82.3%','精确率':'87.4%','推理时延':'21ms','模型大小':'410 MB','版本':'v2.1','更新日期':'2024-02-20'},
          'DeepLabV3-Surface':{'mAP@0.5':'82.7%','召回率':'80.1%','精确率':'83.6%','推理时延':'31ms','模型大小':'132 MB','版本':'v1.3','更新日期':'2024-01-15'},
          'ConvLSTM-Predictor':{'mAP@0.5':'79.4%','召回率':'77.2%','精确率':'81.0%','推理时延':'38ms','模型大小':'67 MB','版本':'v0.8','更新日期':'2024-03-05'},
        };
        const rows=['mAP@0.5','召回率','精确率','推理时延','模型大小','版本','更新日期'];
        const d0=cmpData[names[0]]||{};
        const d1=cmpData[names[1]]||{};
        return(
          <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.55)',zIndex:9999,display:'flex',alignItems:'center',justifyContent:'center'}} onClick={()=>setCompareOpen(false)}>
            <div style={{background:'var(--bg-card)',borderRadius:12,padding:28,width:560,boxShadow:'0 20px 60px rgba(0,0,0,.4)'}} onClick={e=>e.stopPropagation()}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}>
                <div>
                  <div style={{fontSize:15,fontWeight:700,color:'var(--fg)'}}>模型对比</div>
                  <div style={{fontSize:11,color:'var(--fg-dim)',marginTop:3}}>{names[0]} vs {names[1]}</div>
                </div>
                <span onClick={()=>setCompareOpen(false)} style={{fontSize:20,color:'var(--t3)',cursor:'pointer',lineHeight:1}}>×</span>
              </div>
              <table style={{width:'100%',borderCollapse:'collapse',fontSize:12}}>
                <thead>
                  <tr style={{background:'var(--bg-surface)'}}>
                    <th style={{padding:'9px 14px',textAlign:'left',fontWeight:500,color:'var(--fg-dim)',fontSize:11,width:'30%'}}>指标</th>
                    <th style={{padding:'9px 14px',textAlign:'center',fontWeight:700,color:'var(--blue)',fontSize:12}}>{names[0]}</th>
                    <th style={{padding:'9px 14px',textAlign:'center',fontWeight:700,color:'var(--blue)',fontSize:12}}>{names[1]}</th>
                  </tr>
                </thead>
                <tbody>
                  {rows.map((r,i)=>(
                    <tr key={r} style={{borderTop:'1px solid var(--border)',background:i%2===0?'transparent':'var(--bg-surface)'}}>
                      <td style={{padding:'9px 14px',color:'var(--fg-dim)',fontSize:11}}>{r}</td>
                      <td style={{padding:'9px 14px',textAlign:'center',fontWeight:600,color:'var(--fg)'}}>{d0[r]||'—'}</td>
                      <td style={{padding:'9px 14px',textAlign:'center',fontWeight:600,color:'var(--fg)'}}>{d1[r]||'—'}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
              <div style={{marginTop:20,display:'flex',justifyContent:'flex-end'}}>
                <button onClick={()=>setCompareOpen(false)} style={{padding:'7px 20px',background:'var(--bg-surface)',color:'var(--fg)',border:'1px solid var(--border)',borderRadius:6,fontSize:12,cursor:'pointer'}}>关闭</button>
              </div>
            </div>
          </div>
        );
      })()}
      {/* ── Hub: 部署弹窗 ── */}
      {deployOpen&&(
        <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.55)',zIndex:9999,display:'flex',alignItems:'center',justifyContent:'center'}} onClick={()=>setDeployOpen(false)}>
          <div style={{background:'var(--bg-card)',borderRadius:12,padding:28,width:480,boxShadow:'0 20px 60px rgba(0,0,0,.4)'}} onClick={e=>e.stopPropagation()}>
            {deployDone?(
              <div style={{textAlign:'center',padding:'16px 0'}}>
                <div style={{fontSize:36,marginBottom:12}}>✅</div>
                <div style={{fontSize:15,fontWeight:700,color:'var(--green)',marginBottom:8}}>部署成功</div>
                <div style={{fontSize:12,color:'var(--fg-dim)',marginBottom:6}}>服务已创建，正在初始化中（约 60s）</div>
                <div style={{fontFamily:'monospace',fontSize:11,color:'var(--blue)',background:'var(--bg-surface)',borderRadius:6,padding:'8px 12px',marginBottom:20,wordBreak:'break-all'}}>{deployEndpoint}</div>
                <button className="btn-pri" style={{padding:'7px 24px'}} onClick={()=>setDeployOpen(false)}>关闭</button>
              </div>
            ):(
              <>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}>
                  <div><div style={{fontSize:15,fontWeight:700,color:'var(--fg)'}}>部署为推理服务</div><div style={{fontSize:11,color:'var(--fg-dim)',marginTop:3}}>模型：{sel}</div></div>
                  <span onClick={()=>setDeployOpen(false)} style={{fontSize:20,color:'var(--t3)',cursor:'pointer',lineHeight:1}}>×</span>
                </div>
                <div style={{marginBottom:14}}>
                  <div style={{fontSize:12,fontWeight:600,color:'var(--fg)',marginBottom:5}}>服务名称 <span style={{color:'var(--red)'}}>*</span></div>
                  <input value={deployForm.name} onChange={e=>setDeployForm(p=>({...p,name:e.target.value}))} placeholder="如 resnet50-weld-v3-svc" style={{width:'100%',padding:'8px 10px',borderRadius:6,border:`1px solid ${deployForm.name?'var(--border)':'var(--red)'}`,background:'var(--bg-surface)',color:'var(--fg)',fontSize:12,outline:'none'}}/>
                </div>
                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:14}}>
                  <div>
                    <div style={{fontSize:12,fontWeight:600,color:'var(--fg)',marginBottom:5}}>副本数</div>
                    <select value={deployForm.replicas} onChange={e=>setDeployForm(p=>({...p,replicas:e.target.value}))} style={{width:'100%',padding:'8px 10px',borderRadius:6,border:'1px solid var(--border)',background:'var(--bg-surface)',color:'var(--fg)',fontSize:12}}>
                      {['1','2','4','8'].map(o=><option key={o}>{o}</option>)}
                    </select>
                  </div>
                  <div>
                    <div style={{fontSize:12,fontWeight:600,color:'var(--fg)',marginBottom:5}}>资源规格</div>
                    <select value={deployForm.resource} onChange={e=>setDeployForm(p=>({...p,resource:e.target.value}))} style={{width:'100%',padding:'8px 10px',borderRadius:6,border:'1px solid var(--border)',background:'var(--bg-surface)',color:'var(--fg)',fontSize:12}}>
                      {['CPU-4c8g','GPU-small (T4)','GPU-large (A100)'].map(o=><option key={o}>{o}</option>)}
                    </select>
                  </div>
                </div>
                <div style={{background:'var(--bg-surface)',borderRadius:6,padding:'10px 12px',marginBottom:20,border:'1px solid var(--border)'}}>
                  <div style={{fontSize:10,color:'var(--fg-dim)',marginBottom:4}}>端点预览</div>
                  <div style={{fontFamily:'monospace',fontSize:11,color:'var(--blue)',wordBreak:'break-all'}}>{deployEndpoint}</div>
                </div>
                <div style={{display:'flex',gap:8}}>
                  <button className="btn-sec" style={{flex:1,justifyContent:'center'}} onClick={()=>setDeployOpen(false)}>取消</button>
                  <button onClick={()=>{if(deployForm.name)setDeployDone(true);}} style={{flex:1,padding:'8px',background:deployForm.name?'var(--blue)':'var(--t3)',color:'#fff',border:'none',borderRadius:6,fontSize:13,fontWeight:600,cursor:deployForm.name?'pointer':'not-allowed'}}>确认部署</button>
                </div>
              </>
            )}
          </div>
        </div>
      )}
      {/* ── Hub: 一键调优向导 ── */}
      {tuneOpen&&(
        <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.55)',zIndex:9999,display:'flex',alignItems:'center',justifyContent:'center'}} onClick={()=>setTuneOpen(false)}>
          <div style={{background:'var(--bg-card)',borderRadius:12,padding:28,width:520,boxShadow:'0 20px 60px rgba(0,0,0,.4)'}} onClick={e=>e.stopPropagation()}>
            {tuneDone?(
              <div style={{textAlign:'center',padding:'20px 0'}}>
                <div style={{fontSize:40,marginBottom:14}}>🚀</div>
                <div style={{fontSize:16,fontWeight:700,color:'var(--green)',marginBottom:8}}>调优任务已提交</div>
                <div style={{fontSize:12,color:'var(--fg-dim)',marginBottom:6}}>基于「{sel}」的微调训练已加入队列</div>
                <div style={{fontSize:11,fontFamily:'monospace',color:'var(--blue)',background:'var(--bg-surface)',borderRadius:6,padding:'7px 12px',marginBottom:20}}>实验 ID: EXP-TUNE-{String(Math.floor(Math.random()*9000)+1000)}</div>
                <div style={{display:'flex',gap:8,justifyContent:'center'}}>
                  <button className="btn-sec" style={{padding:'7px 20px'}} onClick={()=>setTuneOpen(false)}>关闭</button>
                  <button className="btn-pri" style={{padding:'7px 20px'}} onClick={()=>setTuneOpen(false)}>→ 前往实验管理</button>
                </div>
              </div>
            ):(
              <>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
                  <div>
                    <div style={{fontSize:15,fontWeight:700,color:'var(--fg)'}}>一键调优向导</div>
                    <div style={{fontSize:11,color:'var(--fg-dim)',marginTop:3}}>基础模型：{sel}</div>
                  </div>
                  <span onClick={()=>setTuneOpen(false)} style={{fontSize:20,color:'var(--t3)',cursor:'pointer',lineHeight:1}}>×</span>
                </div>
                {/* steps */}
                <div style={{display:'flex',marginBottom:20,marginTop:10}}>
                  {['数据集','调优参数','确认'].map((s,i)=>(
                    <div key={i} style={{flex:1,textAlign:'center',position:'relative'}}>
                      <div style={{width:24,height:24,borderRadius:'50%',background:i<=tuneStep?'var(--blue)':'var(--border)',color:i<=tuneStep?'#fff':'var(--t3)',fontSize:11,fontWeight:700,display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 4px'}}>{i+1}</div>
                      <div style={{fontSize:10,color:i===tuneStep?'var(--blue)':'var(--t3)',fontWeight:i===tuneStep?600:400}}>{s}</div>
                      {i<2&&<div style={{position:'absolute',top:12,left:'50%',width:'100%',height:1,background:i<tuneStep?'var(--blue)':'var(--border)',zIndex:-1}}/>}
                    </div>
                  ))}
                </div>
                {tuneStep===0&&(
                  <div>
                    <div style={{fontSize:12,fontWeight:600,color:'var(--fg)',marginBottom:8}}>选择微调数据集</div>
                    {['焊缝缺陷检测数据集 V2','PCB检测数据集 V1','表面缺陷综合集 V3'].map(ds=>(
                      <div key={ds} onClick={()=>setTuneForm(p=>({...p,ds}))} style={{padding:'12px 14px',borderRadius:7,border:`1.5px solid ${tuneForm.ds===ds?'var(--blue)':'var(--border)'}`,marginBottom:8,cursor:'pointer',background:tuneForm.ds===ds?'rgba(15,98,254,.06)':'',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
                        <div>
                          <div style={{fontSize:12,fontWeight:600,color:'var(--fg)'}}>{ds}</div>
                          <div style={{fontSize:11,color:'var(--fg-dim)',marginTop:2}}>已标注 · COCO 格式</div>
                        </div>
                        {tuneForm.ds===ds&&<span style={{color:'var(--blue)',fontSize:16,fontWeight:700}}>✓</span>}
                      </div>
                    ))}
                  </div>
                )}
                {tuneStep===1&&(
                  <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14}}>
                    {[
                      {l:'学习率',k:'lr',opts:['1e-5','5e-5','1e-4','5e-4']},
                      {l:'训练轮次 (Epochs)',k:'epochs',opts:['10','20','50','100']},
                      {l:'冻结基础层数',k:'freeze',opts:['0','4','8','12']},
                      {l:'GPU 数量',k:'gpu',opts:['1','2','4']},
                    ].map(f=>(
                      <div key={f.k}>
                        <label style={{fontSize:12,fontWeight:600,color:'var(--fg)',marginBottom:5,display:'block'}}>{f.l}</label>
                        <select value={tuneForm[f.k]} onChange={e=>setTuneForm(p=>({...p,[f.k]:e.target.value}))} style={{width:'100%',padding:'8px 10px',borderRadius:6,border:'1px solid var(--border)',background:'var(--bg-surface)',color:'var(--fg)',fontSize:12}}>
                          {f.opts.map(o=><option key={o}>{o}</option>)}
                        </select>
                      </div>
                    ))}
                    <div style={{gridColumn:'span 2',background:'rgba(15,98,254,.06)',borderRadius:6,padding:'10px 12px',border:'1px solid rgba(15,98,254,.15)',fontSize:11,color:'var(--fg-dim)'}}>
                      预计耗时：{Math.round(parseInt(tuneForm.epochs)*2.4/parseInt(tuneForm.gpu))} 分钟 · GPU: {tuneForm.gpu}×T4 · 预计显存：{Math.round(16/parseInt(tuneForm.gpu)*2)}GB/卡
                    </div>
                  </div>
                )}
                {tuneStep===2&&(
                  <div>
                    <div style={{fontSize:12,fontWeight:600,color:'var(--fg)',marginBottom:10}}>确认调优配置</div>
                    {[['基础模型',sel],['微调数据集',tuneForm.ds],['学习率',tuneForm.lr],['Epochs',tuneForm.epochs],['冻结层数',tuneForm.freeze],['GPU 数量',tuneForm.gpu+' 卡']].map(([k,v])=>(
                      <div key={k} style={{display:'flex',justifyContent:'space-between',padding:'7px 0',borderBottom:'1px solid var(--border)',fontSize:12}}>
                        <span style={{color:'var(--fg-dim)'}}>{k}</span><span style={{fontWeight:600,color:'var(--fg)'}}>{v}</span>
                      </div>
                    ))}
                  </div>
                )}
                <div style={{display:'flex',gap:8,marginTop:20}}>
                  <button className="btn-sec" style={{flex:1,justifyContent:'center'}} onClick={()=>tuneStep>0?setTuneStep(p=>p-1):setTuneOpen(false)}>{tuneStep>0?'上一步':'取消'}</button>
                  <button onClick={()=>tuneStep<2?setTuneStep(p=>p+1):setTuneDone(true)} style={{flex:1,padding:'8px',background:'var(--blue)',color:'#fff',border:'none',borderRadius:6,fontSize:13,fontWeight:600,cursor:'pointer'}}>{tuneStep<2?'下一步':'提交调优任务'}</button>
                </div>
              </>
            )}
          </div>
        </div>
      )}
      {/* 收藏夹抽屉 */}
      {favDrawerOpen&&(
        <div style={{position:'fixed',inset:0,zIndex:900}} onClick={()=>setFavDrawerOpen(false)}>
          <div style={{position:'absolute',top:0,right:0,width:360,height:'100%',background:'var(--bg-card)',borderLeft:'1px solid var(--border)',display:'flex',flexDirection:'column',boxShadow:'-4px 0 24px rgba(0,0,0,0.12)'}} onClick={e=>e.stopPropagation()}>
            {/* header */}
            <div style={{padding:'16px 18px',borderBottom:'1px solid var(--border)',display:'flex',justifyContent:'space-between',alignItems:'center',flexShrink:0}}>
              <div style={{fontSize:14,fontWeight:700,color:'var(--fg)'}}>我的收藏</div>
              <span style={{cursor:'pointer',color:'var(--t3)',fontSize:18}} onClick={()=>setFavDrawerOpen(false)}>✕</span>
            </div>
            {/* new group */}
            <div style={{padding:'10px 18px',borderBottom:'1px solid var(--border)',flexShrink:0}}>
              {favNewGrpOpen?(
                <div style={{display:'flex',gap:6}}>
                  <input value={favNewGrpInput} onChange={e=>setFavNewGrpInput(e.target.value)} placeholder="分组名称…"
                    style={{flex:1,padding:'5px 10px',borderRadius:6,border:'1px solid var(--border)',background:'var(--bg-main)',color:'var(--fg)',fontSize:12,outline:'none'}}/>
                  <button onClick={()=>{if(favNewGrpInput.trim()){setFavGroups(gs=>[...gs,{name:favNewGrpInput.trim(),models:[]}]);setFavExpanded(s=>{const n=new Set(s);n.add(favNewGrpInput.trim());return n;});}setFavNewGrpInput('');setFavNewGrpOpen(false);}}
                    style={{padding:'5px 12px',borderRadius:6,fontSize:12,background:'var(--blue)',color:'#fff',border:'none',cursor:'pointer'}}>确认</button>
                  <button onClick={()=>{setFavNewGrpOpen(false);setFavNewGrpInput('');}} style={{padding:'5px 10px',borderRadius:6,fontSize:12,border:'1px solid var(--border)',color:'var(--fg-dim)',background:'transparent',cursor:'pointer'}}>取消</button>
                </div>
              ):(
                <button onClick={()=>setFavNewGrpOpen(true)} style={{fontSize:12,color:'var(--blue)',border:'none',background:'transparent',cursor:'pointer',padding:0}}>+ 新建分组</button>
              )}
            </div>
            {/* groups */}
            <div style={{flex:1,overflowY:'auto',padding:'8px 0'}}>
              {favGroups.map((grp,gi)=>{
                const isExp=favExpanded.has(grp.name);
                return(
                  <div key={grp.name} style={{marginBottom:2}}>
                    <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'8px 18px',cursor:'pointer',background:'var(--bg-main)'}}
                      onClick={()=>setFavExpanded(s=>{const n=new Set(s);n.has(grp.name)?n.delete(grp.name):n.add(grp.name);return n;})}>
                      <div style={{display:'flex',alignItems:'center',gap:6}}>
                        <span style={{fontSize:11,color:'var(--t3)',transition:'transform .2s',display:'inline-block',transform:isExp?'rotate(0deg)':'rotate(-90deg)'}}>▼</span>
                        <span style={{fontSize:12,fontWeight:600,color:'var(--fg)'}}>{grp.name}</span>
                        <span style={{fontSize:10,color:'var(--t3)',background:'var(--border)',borderRadius:99,padding:'1px 7px'}}>{grp.models.length}</span>
                      </div>
                    </div>
                    {isExp&&(
                      <div style={{paddingBottom:4}}>
                        {grp.models.map((mdl,mi)=>(
                          <div key={mdl} style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'7px 18px 7px 36px',borderBottom:'1px solid var(--border)'}}>
                            <span style={{fontSize:12,color:'var(--fg)',fontWeight:500}}>{mdl}</span>
                            <div style={{display:'flex',alignItems:'center',gap:6}}>
                              <select onChange={e=>{const tgt=e.target.value;if(!tgt)return;setFavGroups(gs=>gs.map((g,idx)=>{if(idx===gi)return{...g,models:g.models.filter(m=>m!==mdl)};if(g.name===tgt)return{...g,models:[...g.models,mdl]};return g;}));e.target.value='';}}
                                style={{fontSize:10,padding:'2px 4px',borderRadius:4,border:'1px solid var(--border)',background:'var(--bg-main)',color:'var(--fg)',cursor:'pointer'}}>
                                <option value=''>移动到…</option>
                                {favGroups.filter((_,idx)=>idx!==gi).map(g=><option key={g.name} value={g.name}>{g.name}</option>)}
                              </select>
                              <button onClick={()=>setFavGroups(gs=>gs.map((g,idx)=>idx===gi?{...g,models:g.models.filter(m=>m!==mdl)}:g))}
                                style={{fontSize:10,color:'var(--red)',border:'none',background:'transparent',cursor:'pointer',padding:'2px 4px'}}>取消收藏</button>
                            </div>
                          </div>
                        ))}
                        {grp.models.length===0&&<div style={{padding:'8px 36px',fontSize:11,color:'var(--t3)'}}>暂无收藏模型</div>}
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

                    if(prioDragIdx===null||prioDragIdx===i)return;
                    setPrioTasks(arr=>{const a=[...arr];const [item]=a.splice(prioDragIdx,1);a.splice(i,0,item);return a;});

                <td style={{padding:'10px 16px'}}>{r.name}</td>
                <td style={{padding:'10px 16px'}}><span style={{background:'#e8daff',color:'#6929c4',padding:'2px 8px',borderRadius:3,fontSize:11}}>{r.type}</span></td>
                <td style={{padding:'10px 16px',color:'var(--text-sec)'}}>{r.time}</td>
                <td style={{padding:'10px 16px',color:'var(--red)',fontFamily:'monospace',fontSize:12}}>{r.reason}</td>

            ))}

        </table>
      </div>

      {selFail&&(

          <div style={{background:'var(--bg-card)',borderRadius:12,padding:28,width:560,boxShadow:'0 20px 60px rgba(0,0,0,.4)',maxHeight:'80vh',overflowY:'auto'}} onClick={e=>e.stopPropagation()}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:18}}>
              <div>
                <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:4}}>
                  <span style={{fontSize:10,padding:'2px 7px',borderRadius:3,background:'rgba(218,30,40,.12)',color:'var(--red)',fontWeight:700}}>失败</span>
                  <span style={{fontFamily:'monospace',fontSize:12,color:'var(--text-sec)'}}>{selFail.id}</span>
                </div>
                <div style={{fontSize:15,fontWeight:700,color:'var(--text-main)'}}>{selFail.name}</div>
              </div>
              <span onClick={()=>setSelFail(null)} style={{fontSize:20,color:'var(--text-sec)',cursor:'pointer',lineHeight:1,flexShrink:0,marginLeft:12}}>×</span>
            </div>
            {/* meta */}
            <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:10,marginBottom:18}}>
              {[['类型',selFail.type],['失败时间',selFail.time],['节点',selFail.node]].map(([k,v])=>(
                <div key={k} style={{background:'var(--bg-main)',borderRadius:6,padding:'9px 12px',border:'1px solid var(--border)'}}>
                  <div style={{fontSize:10,color:'var(--text-sec)',marginBottom:3}}>{k}</div>
                  <div style={{fontSize:12,fontWeight:600,color:'var(--text-main)'}}>{v}</div>
                </div>
              ))}
            </div>
            {/* error */}
            <div style={{fontSize:11,fontWeight:700,color:'var(--text-sec)',marginBottom:6,letterSpacing:'.08em',textTransform:'uppercase'}}>错误信息</div>
            <div style={{fontFamily:'monospace',fontSize:11.5,color:'#ef4444',background:'#1a1a1a',borderRadius:7,padding:'12px 14px',marginBottom:16,lineHeight:1.8}}>
              {selFail.reason}<br/>
              {'  at train_loop() line 342'}<br/>
              {'  OOM: tried to allocate 18.5 GiB'}<br/>
              {'  GPU memory: 15.9 GiB total, 15.7 GiB used'}
            </div>
            {/* full log */}
            <div style={{fontSize:11,fontWeight:700,color:'var(--text-sec)',marginBottom:6,letterSpacing:'.08em',textTransform:'uppercase'}}>完整日志（近 20 行）</div>
            <div style={{fontFamily:'monospace',fontSize:10.5,color:'#a8a8a8',background:'#1a1a1a',borderRadius:7,padding:'12px 14px',marginBottom:18,lineHeight:1.9,maxHeight:160,overflowY:'auto'}}>
              {['[08:14:02] Epoch 12/50 started',`[08:14:03] Loading batch 1024/2048`,'[08:14:08] Forward pass OK','[08:14:09] Backward pass OK','[08:14:11] Epoch 12 loss=0.432','[08:14:12] Epoch 13/50 started','[08:14:14] Loading batch 1024/2048','[08:14:18] Forward pass OK',`[08:14:20] RuntimeError: ${selFail.reason}`,'[08:14:20] Traceback (most recent call last):','[08:14:20]   File "train.py", line 342, in train_loop','[08:14:20] Process killed by OOM-killer'].map((l,i)=>(
                <div key={i} style={{color:l.includes('Error')||l.includes('killed')?'#ef4444':undefined}}>{l}</div>
              ))}
            </div>
            {/* actions */}
            <div style={{display:'flex',gap:8}}>
              <button onClick={()=>setSelFail(null)} style={{flex:1,padding:'8px',background:'#fff',color:'var(--text-main)',border:'1px solid var(--border)',borderRadius:4,fontSize:13,cursor:'pointer'}}>关闭</button>
              <button onClick={()=>{setRetried(p=>new Set([...p,selFail.id]));setSelFail(null);}} style={{flex:1,padding:'8px',background:retried.has(selFail.id)?'var(--text-sec)':'var(--blue)',color:'#fff',border:'none',borderRadius:4,fontSize:13,fontWeight:600,cursor:'pointer'}}>
                {retried.has(selFail.id)?'已重试':'↺ 重试任务'}
              </button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

                      </div>
                      <div>
                        <div style={{fontSize:11,fontWeight:600,color:'var(--text-main)',marginBottom:4}}>执行时间</div>
                        <input type="time" value={batchForm.schedTime.split('T')[1]||'09:00'} onChange={e=>setBatchForm(p=>({...p,schedTime:(p.schedTime.split('T')[0]||new Date().toISOString().split('T')[0])+'T'+e.target.value}))} style={{width:'100%',padding:'6px 8px',borderRadius:4,border:'1px solid var(--border)',background:'#fff',color:'var(--text-main)',fontSize:12,outline:'none',boxSizing:'border-box'}}/>
                      </div>
                      <div style={{gridColumn:'1/-1',display:'flex',gap:6,flexWrap:'wrap'}}>

                        ))}
                      </div>
                    </div>
                  )}
                </div>
                <div style={{display:'flex',gap:8}}>
                  <button onClick={()=>setNewBatchOpen(false)} style={{flex:1,padding:'8px',background:'#fff',color:'var(--text-main)',border:'1px solid var(--border)',borderRadius:4,fontSize:13,cursor:'pointer'}}>取消</button>
                  <button onClick={()=>{if(batchForm.name)setBatchDone(true);}} style={{flex:1,padding:'8px',background:batchForm.name?'var(--blue)':'#8d8d8d',color:'#fff',border:'none',borderRadius:4,fontSize:13,fontWeight:600,cursor:batchForm.name?'pointer':'not-allowed'}}>提交任务</button>
                </div>
              </>
            )}
          </div>
        </div>
      )}
    </div>
  );
}

  const [selectedImg,setSelectedImg]=useState(null);
  const [rejectOpen,setRejectOpen]=useState(false);
  const [rejectNote,setRejectNote]=useState('');

  const items=[

    {id:'ANN-002',file:'weld_002.jpg',annotator:'李四',task:'焊缝缺陷检测',boxes:1,time:'10:31',status:'pending'},
    {id:'ANN-003',file:'pcb_017.jpg',annotator:'王五',task:'PCB缺陷检测',boxes:5,time:'11:02',status:'pending'},
    {id:'ANN-004',file:'pipe_003.jpg',annotator:'赵六',task:'管道裂纹检测',boxes:2,time:'11:15',status:'pending'},
    {id:'ANN-005',file:'weld_008.jpg',annotator:'张三',task:'焊缝缺陷检测',boxes:4,time:'09:45',status:'approved'},
    {id:'ANN-006',file:'pcb_011.jpg',annotator:'李四',task:'PCB缺陷检测',boxes:2,time:'09:12',status:'approved'},
    {id:'ANN-007',file:'pipe_001.jpg',annotator:'王五',task:'管道裂纹检测',boxes:1,time:'08:55',status:'rejected'},
    {id:'ANN-008',file:'weld_005.jpg',annotator:'赵六',task:'焊缝缺陷检测',boxes:3,time:'08:30',status:'rejected'},
  ];

  const getStatus=it=>statuses[it.id]||it.status;
  const tabStatus=['pending','approved','rejected'];
  const tabLabels=['待审核','已通过','已驳回'];
  const counts=tabStatus.map(s=>items.filter(it=>getStatus(it)===s).length);
  const filtered=items.filter(it=>getStatus(it)===tabStatus[tab]);
  const sel=selectedImg&&items.find(it=>it.id===selectedImg);
  const selStatus=sel?getStatus(sel):null;

  const doApprove=()=>{
    if(!sel)return;
    setStatuses(p=>({...p,[sel.id]:'approved'}));
    setSelectedImg(null);
  };
  const doReject=()=>{
    setStatuses(p=>({...p,[sel.id]:'rejected'}));
    setRejectOpen(false);setRejectNote('');setSelectedImg(null);
  };

  return(
    <div className="content">
      {/* summary cards */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:12,marginBottom:20}}>
        {[['待审核',counts[0],'var(--orange)'],['已通过',counts[1],'var(--green)'],['已驳回',counts[2],'var(--red)']].map(([l,v,c])=>(
          <div key={l} style={{background:'var(--bg-card)',borderRadius:8,padding:'14px 16px',border:'1px solid var(--border)'}}>
            <div style={{fontSize:11,color:'var(--fg-dim)',marginBottom:6}}>{l}</div>
            <div style={{fontSize:26,fontWeight:700,color:c}}>{v}</div>
          </div>
        ))}
      </div>
      {/* tab bar */}
      <div style={{display:'flex',gap:8,marginBottom:16}}>
        {tabLabels.map((t,i)=>(
          <button key={t} onClick={()=>{setTab(i);setSelectedImg(null);}} style={{
            padding:'5px 14px',borderRadius:6,fontSize:12,cursor:'pointer',border:'1px solid',
            background:tab===i?'var(--blue)':'transparent',
            borderColor:tab===i?'var(--blue)':'var(--border)',
            color:tab===i?'#fff':'var(--fg-dim)'
          }}>{t} ({counts[i]})</button>
        ))}
      </div>
      {/* split layout */}
      <div style={{display:'flex',gap:16,alignItems:'flex-start'}}>
        {/* left list */}
        <div style={{flex:1,background:'var(--bg-card)',borderRadius:8,border:'1px solid var(--border)',overflow:'hidden'}}>
          <table style={{width:'100%',borderCollapse:'collapse',fontSize:12}}>
            <thead><tr style={{color:'var(--fg-dim)',borderBottom:'1px solid var(--border)'}}>
              {['文件名','标注员','任务','标注框','时间'].map(h=><th key={h} style={{padding:'9px 16px',textAlign:'left',fontWeight:500}}>{h}</th>)}

            <tbody>
              {filtered.length===0&&<tr><td colSpan={5} style={{padding:'24px',textAlign:'center',color:'var(--fg-dim)'}}>暂无数据</td></tr>}
              {filtered.map(it=>{
                const isSel=selectedImg===it.id;
                return(
                  <tr key={it.id} onClick={()=>setSelectedImg(it.id)}
                    style={{borderBottom:'1px solid var(--border)',cursor:'pointer',
                      background:isSel?'var(--blue-s)':'',
                      borderLeft:isSel?'3px solid var(--blue)':'3px solid transparent'}}
                    onMouseEnter={e=>{if(!isSel)e.currentTarget.style.background='var(--bg-hover)';}}
                    onMouseLeave={e=>{if(!isSel)e.currentTarget.style.background='';}}>
                    <td style={{padding:'10px 16px',fontWeight:500,color:'var(--fg)'}}>{it.file}</td>
                    <td style={{padding:'10px 16px',color:'var(--fg-dim)'}}>{it.annotator}</td>
                    <td style={{padding:'10px 16px',color:'var(--fg-dim)'}}>{it.task}</td>
                    <td style={{padding:'10px 16px'}}>
                      <span style={{background:'var(--blue-s)',color:'var(--blue)',borderRadius:99,padding:'2px 8px',fontSize:11,fontWeight:700}}>{it.boxes}框</span>
                    </td>
                    <td style={{padding:'10px 16px',color:'var(--fg-dim)',fontSize:11}}>{it.time}</td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
        {/* right preview */}
        <div style={{width:320,background:'var(--bg-card)',borderRadius:8,border:'1px solid var(--border)',padding:16,flexShrink:0}}>
          {!sel?(
            <div style={{height:300,display:'flex',alignItems:'center',justifyContent:'center',color:'var(--fg-dim)',fontSize:13}}>← 点击左侧图片预览标注</div>
          ):(
            <>
              <div style={{fontSize:13,fontWeight:700,color:'var(--fg)',marginBottom:12}}>标注预览</div>
              <div style={{height:200,background:'#1a1f23',borderRadius:6,display:'flex',alignItems:'center',justifyContent:'center',marginBottom:14}}>
                <span style={{color:'var(--fg-dim)',fontSize:13}}>[{sel.boxes}个标注框]</span>
              </div>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:14}}>
                {[['文件名',sel.file],['标注员',sel.annotator],['任务',sel.task],['标注框数',sel.boxes+'个']].map(([k,v])=>(
                  <div key={k} style={{background:'var(--bg-surface)',borderRadius:6,padding:'8px 10px',border:'1px solid var(--border)'}}>
                    <div style={{fontSize:10,color:'var(--fg-dim)',marginBottom:2}}>{k}</div>
                    <div style={{fontSize:12,fontWeight:600,color:'var(--fg)'}}>{v}</div>

                  <button onClick={()=>setRejectOpen(true)} style={{flex:1,padding:'8px',background:'transparent',color:'var(--red)',border:'1px solid var(--red)',borderRadius:6,fontSize:13,fontWeight:600,cursor:'pointer'}}>驳回 ✗</button>
                </div>
              )}
              {selStatus==='approved'&&<div style={{textAlign:'center',color:'var(--green)',fontWeight:600,fontSize:13}}>✓ 已通过</div>}
              {selStatus==='rejected'&&<div style={{textAlign:'center',color:'var(--red)',fontWeight:600,fontSize:13}}>✗ 已驳回</div>}
            </>
          )}
        </div>
      </div>
      {/* reject modal */}
      {rejectOpen&&(
        <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.55)',zIndex:9999,display:'flex',alignItems:'center',justifyContent:'center'}} onClick={()=>setRejectOpen(false)}>
          <div style={{background:'var(--bg-card)',borderRadius:12,padding:28,width:420,boxShadow:'0 20px 60px rgba(0,0,0,.4)'}} onClick={e=>e.stopPropagation()}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
              <div style={{fontSize:15,fontWeight:700,color:'var(--fg)'}}>驳回原因</div>
              <span onClick={()=>setRejectOpen(false)} style={{fontSize:20,color:'var(--t3)',cursor:'pointer',lineHeight:1}}>×</span>
            </div>
            <textarea value={rejectNote} onChange={e=>setRejectNote(e.target.value)} placeholder="请填写驳回原因…" rows={4} style={{width:'100%',padding:'9px 11px',borderRadius:6,border:'1px solid var(--border)',background:'var(--bg-surface)',color:'var(--fg)',fontSize:12,outline:'none',resize:'vertical',fontFamily:'inherit'}}/>

              <button onClick={()=>setRejectOpen(false)} style={{flex:1,padding:'8px',background:'transparent',color:'var(--fg-dim)',border:'1px solid var(--border)',borderRadius:6,fontSize:13,cursor:'pointer'}}>取消</button>
              <button onClick={doReject} style={{flex:1,padding:'8px',background:'var(--red)',color:'#fff',border:'none',borderRadius:6,fontSize:13,fontWeight:600,cursor:'pointer'}}>确认驳回</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

      {tab===1&&(

          <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:12,marginBottom:20}}>
            {[['模型平均mAP','87.3%','var(--blue)'],['数据质量分','92/100','var(--green)'],['标注准确率','98.1%','var(--orange)']].map(([l,v,c])=>(
              <div key={l} style={{background:'var(--bg-card)',borderRadius:8,padding:'14px 16px',border:'1px solid var(--border)'}}>
                <div style={{fontSize:11,color:'var(--fg-dim)',marginBottom:6}}>{l}</div>
                <div style={{fontSize:26,fontWeight:700,color:c}}>{v}</div>
              </div>
            ))}
          </div>
          <div style={{background:'var(--bg-card)',borderRadius:8,border:'1px solid var(--border)'}}>
            <div style={{padding:'12px 16px',borderBottom:'1px solid var(--border)',fontSize:12,fontWeight:600,color:'var(--fg)'}}>模型质量汇总</div>
            <table style={{width:'100%',borderCollapse:'collapse',fontSize:12}}>
              <thead><tr style={{color:'var(--fg-dim)',borderBottom:'1px solid var(--border)'}}>
                {['模型名称','版本','mAP','召回率','F1','评估日期'].map(h=><th key={h} style={{padding:'8px 16px',textAlign:'left',fontWeight:500}}>{h}</th>)}
              </tr></thead>
              <tbody>
                {[['焊缝缺陷检测','v2.3','89.2%','86.7%','87.9%','2025-05-08'],['PCB缺陷检测','v1.8','91.5%','88.3%','89.9%','2025-05-07'],['管道裂纹检测','v3.1','85.6%','83.1%','84.3%','2025-05-06'],['表面质检通用','v1.2','82.9%','80.4%','81.6%','2025-05-05']].map(([name,ver,map,rec,f1,dt])=>(
                  <tr key={name} style={{borderBottom:'1px solid var(--border)'}} onMouseEnter={e=>e.currentTarget.style.background='var(--bg-hover)'} onMouseLeave={e=>e.currentTarget.style.background=''}>
                    <td style={{padding:'9px 16px',fontWeight:500,color:'var(--fg)'}}>{name}</td>
                    <td style={{padding:'9px 16px',color:'var(--fg-dim)'}}>{ver}</td>
                    <td style={{padding:'9px 16px',fontWeight:600,color:'var(--blue)'}}>{map}</td>
                    <td style={{padding:'9px 16px'}}>{rec}</td>
                    <td style={{padding:'9px 16px'}}>{f1}</td>
                    <td style={{padding:'9px 16px',color:'var(--fg-dim)',fontSize:11}}>{dt}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
          {/* 标注工作量统计 */}
          <div style={{background:'var(--bg-card)',borderRadius:8,border:'1px solid var(--border)',padding:20,marginTop:16}}>
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:16}}>
              <div style={{fontSize:13,fontWeight:700,color:'var(--fg)'}}>标注工作量统计</div>
              <div style={{display:'flex',gap:6}}>
                {['近7天','近30天','近90天'].map(r=>(
                  <button key={r} onClick={()=>setAnnWorkRange(r)} style={{padding:'3px 12px',borderRadius:99,fontSize:11,cursor:'pointer',border:'1px solid',background:annWorkRange===r?'var(--blue)':'transparent',borderColor:annWorkRange===r?'var(--blue)':'var(--border)',color:annWorkRange===r?'#fff':'var(--fg-dim)',fontWeight:annWorkRange===r?600:400}}>{r}</button>
                ))}
              </div>
            </div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:20}}>
              {/* 水平条形图 */}
              <div>
                <div style={{fontSize:11,fontWeight:600,color:'var(--fg-dim)',marginBottom:12}}>标注员工作量排行（张数）</div>
                {ANN_DATA[annWorkRange].workers.map((w,i)=>{
                  const pct=w.v/ANN_DATA[annWorkRange].max*100;
                  return(
                    <div key={w.n} style={{marginBottom:10}}>
                      <div style={{display:'flex',justifyContent:'space-between',fontSize:11,marginBottom:3}}>
                        <span style={{color:'var(--fg)',fontWeight:i===0?700:400}}>{w.n}</span>
                        <span style={{color:'var(--fg-dim)'}}>{w.v.toLocaleString()} 张</span>
                      </div>
                      <div style={{height:10,background:'var(--bg-surface)',borderRadius:5,overflow:'hidden',border:'1px solid var(--border)'}}>
                        <div style={{height:'100%',width:`${pct}%`,background:i===0?'var(--blue)':i===1?'var(--green)':i===2?'var(--orange)':'var(--t3)',borderRadius:5,transition:'width .4s'}}/>
                      </div>
                    </div>
                  );
                })}
              </div>
              {/* 折线图趋势 */}
              <div>
                <div style={{fontSize:11,fontWeight:600,color:'var(--fg-dim)',marginBottom:12}}>日均标注量趋势</div>
                {(()=>{
                  const pts=ANN_DATA[annWorkRange].trend;
                  const maxV=Math.max(...pts);
                  const W=460,H=100,pad=8;
                  const xs=pts.map((_,i)=>pad+i*(W-pad*2)/(pts.length-1));
                  const ys=pts.map(v=>H-pad-(v/maxV)*(H-pad*2));
                  const polyline=xs.map((x,i)=>`${x},${ys[i]}`).join(' ');
                  const labels=['日1','日2','日3','日4','日5','日6','日7'];
                  return(
                    <svg width="100%" height={H} viewBox={`0 0 ${W} ${H}`} preserveAspectRatio="xMidYMid meet">
                      <defs><linearGradient id="annGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor="var(--blue)" stopOpacity="0.18"/><stop offset="100%" stopColor="var(--blue)" stopOpacity="0"/></linearGradient></defs>
                      <polygon points={`${xs[0]},${H} ${polyline} ${xs[xs.length-1]},${H}`} fill="url(#annGrad)"/>
                      <polyline points={polyline} fill="none" stroke="var(--blue)" strokeWidth="2"/>
                      {xs.map((x,i)=>(
                        <g key={i}>
                          <circle cx={x} cy={ys[i]} r={3} fill="var(--blue)"/>
                          <text x={x} y={H-1} textAnchor="middle" fontSize={8} fill="var(--fg-dim)">{labels[i]||''}</text>
                        </g>
                      ))}
                    </svg>
                  );
                })()}
              </div>
            </div>
          </div>
        </>
      )}

      {tab===2&&(
        <>
          <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:12,marginBottom:20}}>
            {[['GPU集群利用率','78.5%','var(--orange)'],['存储使用','2.8/10 TB','var(--blue)'],['CPU利用率','45.2%','var(--green)'],['网络吞吐','1.2 GB/s','var(--purple)']].map(([l,v,c])=>(
              <div key={l} style={{background:'var(--bg-card)',borderRadius:8,padding:'14px 16px',border:'1px solid var(--border)'}}>
                <div style={{fontSize:11,color:'var(--fg-dim)',marginBottom:6}}>{l}</div>
                <div style={{fontSize:26,fontWeight:700,color:c}}>{v}</div>
              </div>
            ))}
          </div>
          <div style={{background:'var(--bg-card)',borderRadius:8,border:'1px solid var(--border)',padding:20}}>
            <div style={{fontSize:12,fontWeight:600,color:'var(--fg-dim)',marginBottom:14}}>资源利用率</div>
            {[['GPU集群',78.5,'var(--orange)'],['CPU集群',45.2,'var(--green)'],['内存',62.3,'var(--blue)'],['存储',28.0,'var(--purple)']].map(([name,pct,c])=>(
              <div key={name} style={{marginBottom:14}}>
                <div style={{display:'flex',justifyContent:'space-between',marginBottom:5}}>
                  <span style={{fontSize:12,color:'var(--fg)'}}>{name}</span>
                  <span style={{fontSize:12,fontWeight:700,color:c}}>{pct}%</span>
                </div>
                <div style={{height:8,background:'var(--border)',borderRadius:4,overflow:'hidden'}}>
                  <div style={{height:'100%',width:pct+'%',background:c,borderRadius:4,transition:'width .5s'}}/>
                </div>
              </div>
            ))}
          </div>
        </>
      )}

      {tab===3&&(
        <>
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:16}}>
            <div style={{fontSize:12,color:'var(--fg-dim)'}}>自由添加、移除图表组件，打造专属数据看板。</div>
            <button onClick={()=>setDashPickerOpen(true)} style={{padding:'6px 16px',borderRadius:6,fontSize:12,background:'var(--blue)',color:'#fff',border:'none',cursor:'pointer',fontWeight:600}}>+ 添加组件</button>
          </div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14}}>
            {dashComponents.map(comp=>(
              <div key={comp.id} style={{background:'var(--bg-card)',borderRadius:8,border:'1px solid var(--border)',padding:16,position:'relative'}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
                  <div style={{fontSize:12,fontWeight:600,color:'var(--fg)'}}>{comp.name}</div>
                  <button onClick={()=>setDashComponents(cs=>cs.filter(c=>c.id!==comp.id))} style={{fontSize:11,color:'var(--red)',border:'1px solid rgba(218,30,40,.25)',borderRadius:4,padding:'2px 8px',background:'transparent',cursor:'pointer'}}>移除</button>
                </div>
                {comp.type==='line'&&(
                  <svg width="100%" height="80" viewBox="0 0 300 80">
                    <polyline points="0,70 50,55 100,40 150,48 200,30 250,20 300,28" fill="none" stroke="var(--blue)" strokeWidth="2"/>
                    <polygon points="0,80 0,70 50,55 100,40 150,48 200,30 250,20 300,28 300,80" fill="rgba(15,98,254,0.08)"/>
                    {[0,50,100,150,200,250,300].map((x,i)=><text key={x} x={x} y={78} fontSize={8} fill="var(--fg-dim)" textAnchor="middle">{['1月','2月','3月','4月','5月','6月','7月'][i]}</text>)}
                  </svg>
                )}
                {comp.type==='bar'&&(
                  <svg width="100%" height="80" viewBox="0 0 300 80">
                    {[40,65,50,80,60,90,70].map((h,i)=>(
                      <rect key={i} x={i*42+4} y={80-h} width={32} height={h} rx={2} fill="var(--blue)" opacity={0.75}/>
                    ))}
                    {[0,1,2,3,4,5,6].map(i=><text key={i} x={i*42+20} y={78} fontSize={8} fill="var(--fg-dim)" textAnchor="middle">{['1月','2月','3月','4月','5月','6月','7月'][i]}</text>)}
                  </svg>
                )}
                {comp.type==='heat'&&(
                  <svg width="100%" height="80" viewBox="0 0 300 80">
                    {Array.from({length:5},(_,row)=>Array.from({length:10},(_,col)=>{
                      const v=Math.random();
                      return <rect key={`${row}-${col}`} x={col*30} y={row*16} width={28} height={14} rx={2} fill={`rgba(15,98,254,${0.1+v*0.8})`}/>;
                    }))}
                  </svg>
                )}
                {comp.type==='custom'&&(
                  <div style={{height:80,display:'flex',alignItems:'center',justifyContent:'center',color:'var(--fg-dim)',fontSize:12,border:'1px dashed var(--border)',borderRadius:6}}>{comp.name}</div>
                )}
              </div>
            ))}
            {dashComponents.length===0&&(
              <div style={{gridColumn:'1/-1',textAlign:'center',padding:'40px 0',color:'var(--fg-dim)',fontSize:13}}>
                暂无组件，点击「+ 添加组件」开始构建看板
              </div>
            )}
          </div>
          {/* picker modal */}
          {dashPickerOpen&&(
            <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.45)',zIndex:1000,display:'flex',alignItems:'center',justifyContent:'center'}} onClick={()=>setDashPickerOpen(false)}>
              <div style={{background:'var(--bg-card)',borderRadius:12,width:480,padding:24,boxShadow:'0 8px 40px rgba(0,0,0,0.22)'}} onClick={e=>e.stopPropagation()}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
                  <div style={{fontSize:14,fontWeight:700,color:'var(--fg)'}}>选择组件</div>
                  <span style={{cursor:'pointer',color:'var(--t3)',fontSize:18}} onClick={()=>setDashPickerOpen(false)}>✕</span>
                </div>
                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
                  {[
                    {id:'alert-trend',name:'告警趋势图',icon:'🔔'},
                    {id:'annotator-eff',name:'标注员效率',icon:'✏️'},
                    {id:'model-acc',name:'模型精度分布',icon:'🎯'},
                    {id:'infer-latency',name:'推理延迟分布',icon:'⚡'},
                    {id:'storage-trend',name:'存储用量趋势',icon:'💾'},
                    {id:'active-tasks',name:'活跃任务数',icon:'📊'},
                  ].map(opt=>{
                    const already=dashComponents.some(c=>c.id===opt.id);
                    return(
                      <div key={opt.id} onClick={()=>{if(!already){setDashComponents(cs=>[...cs,{id:opt.id,name:opt.name,type:'custom'}]);setDashPickerOpen(false);}}}
                        style={{display:'flex',alignItems:'center',gap:10,padding:'12px 14px',borderRadius:8,border:`1px solid ${already?'var(--border)':'var(--border)'}`,background:already?'var(--bg-main)':'var(--bg-card)',cursor:already?'not-allowed':'pointer',opacity:already?0.5:1,transition:'all .15s'}}
                        onMouseEnter={e=>{if(!already)e.currentTarget.style.borderColor='var(--blue)';}}
                        onMouseLeave={e=>{e.currentTarget.style.borderColor='var(--border)';}}>
                        <span style={{fontSize:22}}>{opt.icon}</span>
                        <div>
                          <div style={{fontSize:12,fontWeight:600,color:'var(--fg)'}}>{opt.name}</div>
                          {already&&<div style={{fontSize:10,color:'var(--t3)'}}>已添加</div>}
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>
            </div>
          )}
        </>
      )}
    </div>
  );
}

const META={
  login:{title:'登录',bc:''},
  dash:{title:'工作台',bc:null},
  ds:{title:'数据集管理',bc:'数据管理'},
  up:{title:'新建数据集',bc:'数据集管理'},
  ann:{title:'标注任务管理',bc:'数据管理'},
  org:{title:'组织管理',bc:'平台管理'},
  perm:{title:'权限管理',bc:'平台管理'},
  lineage:{title:'数据血缘图',bc:'数据管理'},
  pipeline:{title:'Pipeline编辑器',bc:'数据管理'},
  dsdetail:{title:'数据集详情',bc:'数据集管理'},
  alert:{title:'告警中心',bc:'平台管理'},
  sys:{title:'系统配置',bc:'平台管理'},
  train:{title:'训练监控',bc:'模型开发'},
  exp:{title:'实验管理',bc:'模型开发'},
  eval:{title:'模型评估报告',bc:'模型开发'},
  infer:{title:'推理服务管理',bc:'模型开发'},
  hub:{title:'模型市场',bc:'模型开发'},
  annwork:{title:'标注工作台',bc:'标注任务管理'},
  opmarket:{title:'算子广场',bc:'数据管理'},
  portal:{title:'数据资产门户',bc:'数据管理'},
  batch:{title:'批量推理任务',bc:'模型开发'},
  sched:{title:'调度中心',bc:'运营中心'},
  devenv:{title:'开发环境',bc:'模型开发'},
  resource:{title:'资源管理',bc:'平台管理'},
  usermgmt:{title:'用户管理',bc:'平台管理'},
  edge:{title:'边端管理',bc:'运营中心'},
  annreview:{title:'标注审核',bc:'数据管理'},
  report:{title:'报表中心',bc:'运营中心'},
  datasrc:{title:'数据源管理',bc:'数据管理'},
};
function App(){
  const [s,setS]=useState('login');
  const nav=useCallback(k=>setS(k),[]);
  const m=META[s]||META.dash;
  const Screen=()=>{
    switch(s){
      case 'login': return <Login nav={nav}/>;
      case 'ds': return <DatasetList nav={nav}/>;
      case 'up': return <Upload nav={nav}/>;
      case 'ann': return <Annotation nav={nav}/>;
      case 'org': return <Org nav={nav}/>;
      case 'perm': return <Perm nav={nav}/>;
      case 'lineage': return <Lineage nav={nav}/>;
      case 'pipeline': return <Pipeline nav={nav}/>;
      case 'train': return <Train nav={nav}/>;
      case 'exp': return <Exp nav={nav}/>;
      case 'eval': return <Eval nav={nav}/>;
      case 'infer': return <Infer nav={nav}/>;
      case 'hub': return <Hub nav={nav}/>;
      case 'annwork': return <AnnWork nav={nav}/>;
      case 'dsdetail': return <DsDetail nav={nav}/>;
      case 'alert': return <Alert nav={nav}/>;
      case 'sys': return <Sys nav={nav}/>;
      case 'opmarket': return <OpMarket nav={nav}/>;
      case 'portal': return <Portal nav={nav}/>;
      case 'batch': return <Batch nav={nav}/>;
      case 'sched': return <Sched nav={nav}/>;
      case 'devenv': return <DevEnv nav={nav}/>;
      case 'resource': return <Resource nav={nav}/>;
      case 'usermgmt': return <UserMgmt nav={nav}/>;
      case 'edge': return <Edge nav={nav}/>;
      case 'annreview': return <AnnReview nav={nav}/>;
      case 'report': return <Report nav={nav}/>;
      case 'datasrc': return <DataSrc nav={nav}/>;
      default: return <Dashboard nav={nav}/>;
    }
  };
  if(s==='login') return <Screen/>;
  return(
    <div className="app">
      <Sidebar cur={s} nav={nav}/>
      <div className="main">
        <Header title={m.title} bc={m.bc} nav={nav}/>
        <Screen/>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
