<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1440">
<title>SMP 工业AI小模型平台 · 交互原型 v1</title>
<script src="https://unpkg.com/react@18.2.0/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.23.2/babel.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body,#root{height:100%}
body{font-family:'PingFang SC','Microsoft YaHei','Helvetica Neue',sans-serif;background:#F2F4F8;color:#161616;-webkit-font-smoothing:antialiased}
:root{
  /* IBM Carbon Light — content area */
  --bg-base:#FFFFFF;--bg-nav:#21272A;--bg-surface:#F2F4F8;--bg-card:#FFFFFF;--bg-hover:#E8EDF3;
  --border:#E0E0E0;--border-hi:rgba(15,98,254,0.35);
  --blue:#0F62FE;--blue-s:rgba(15,98,254,0.10);--blue-l:#0F62FE;
  --orange:#D4420A;--green:#198038;--yellow:#B45309;--red:#DA1E28;--purple:#6929C4;
  --t1:#161616;--t2:#525252;--t3:#8D8D8D;
  /* aliases used in newer components */
  --fg:#161616;--fg-dim:#525252;
  --r:8px;--rl:12px;--rs:4px;--sw:220px;--sh:56px;
  --shadow:0 2px 8px rgba(0,0,0,0.12);
  /* legacy aliases used in newer screens */
  --text-main:#161616;--text-sec:#525252;--bg-main:#F2F4F8
}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--t3);border-radius:3px}
.app{display:flex;height:100vh;overflow:hidden}

/* SIDEBAR */
.sb{width:var(--sw);background:var(--bg-nav);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto}
.sb-logo{height:var(--sh);display:flex;align-items:center;padding:0 16px;border-bottom:1px solid var(--border);gap:10px;flex-shrink:0}
.logo-mark{width:32px;height:32px;background:var(--blue);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:900;color:#fff;letter-spacing:-1px}
.logo-txt{font-size:14px;font-weight:700;color:var(--t1)}
.logo-sub{font-size:9px;color:var(--t3);letter-spacing:.08em;margin-top:1px}
.nav-sec{padding:6px 0}
/* Sidebar always dark — hardcode light text regardless of theme */
.logo-txt{color:#F4F4F4!important}
.logo-sub{color:#6F6F6F!important}
.nav-lbl{padding:8px 16px 3px;font-size:9px;font-weight:700;color:#6F6F6F;letter-spacing:.12em;text-transform:uppercase;display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none;transition:color .15s}
.nav-lbl:hover{color:#A8A8A8}
.sec-chev{font-size:8px;opacity:.7;margin-right:4px;transition:transform .2s}
.nav-item{display:flex;align-items:center;padding:8px 16px;gap:9px;cursor:pointer;color:#C6C6C6;font-size:12.5px;transition:all .15s;position:relative;white-space:nowrap;overflow:hidden}
.nav-item:hover{background:rgba(255,255,255,.06);color:#F4F4F4}
.nav-item.on{background:rgba(15,98,254,.22);color:#78A9FF}
.nav-item.on::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:#4589FF;border-radius:0 2px 2px 0}
.nav-item.dim{opacity:.28;cursor:default}
.ni{font-size:14px;width:16px;text-align:center;flex-shrink:0}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.hdr{height:var(--sh);background:var(--bg-card);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px;gap:12px;flex-shrink:0}
.hdr-bc{font-size:11px;color:var(--t3);cursor:pointer;transition:color .15s}
.hdr-bc:hover{color:var(--t2)}
.hdr-sep{color:var(--t3);font-size:11px;margin:0 4px}
.hdr-title{font-size:15px;font-weight:700;color:var(--t1)}
.hdr-right{display:flex;align-items:center;gap:10px;margin-left:auto}
.hdr-btn{width:30px;height:30px;border-radius:var(--rs);background:transparent;border:1px solid var(--border);color:var(--t2);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px;transition:all .15s;position:relative}
.hdr-btn:hover{background:var(--bg-hover);color:var(--t1)}
.notif-dot{position:absolute;top:5px;right:5px;width:5px;height:5px;border-radius:50%;background:var(--red)}
.avatar{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,#0F62FE,#0043CE);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;cursor:pointer}
.srchbox{display:flex;align-items:center;gap:7px;padding:6px 11px;background:var(--bg-base);border:1px solid var(--border);border-radius:var(--rs);color:var(--t2);font-size:12px;width:200px}
.srchbox input{background:none;border:none;outline:none;color:var(--t1);font-size:12px;width:100%}
.srchbox input::placeholder{color:var(--t3)}

/* CONTENT */
.content{flex:1;overflow-y:auto;padding:24px}
.ph{margin-bottom:20px}
.pt{font-size:19px;font-weight:800;color:var(--t1);margin-bottom:3px;letter-spacing:-.3px}
.ps{font-size:12px;color:var(--t2)}
.card{background:var(--bg-surface);border:1px solid var(--border);border-radius:var(--rl);padding:18px}
.ctitle{font-size:12px;font-weight:600;color:var(--t2);margin-bottom:14px;display:flex;align-items:center;gap:5px}

/* GRIDS */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.g5{display:grid;grid-template-columns:repeat(5,1fr);gap:10px}

/* DOMAIN CARDS */
.dc{background:var(--bg-surface);border:1px solid var(--border);border-radius:var(--rl);padding:18px 14px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden}
.dc:hover{border-color:var(--border-hi);transform:translateY(-2px);box-shadow:var(--shadow)}
.dc .di{font-size:26px;margin-bottom:10px;display:block}
.dc .dn{font-size:12.5px;font-weight:700;color:var(--t1);margin-bottom:2px}
.dc .de{font-size:9px;color:var(--t3);letter-spacing:.1em;text-transform:uppercase;margin-bottom:7px}
.dc .dv{font-size:21px;font-weight:900}
.dc .du{font-size:10px;color:var(--t2);margin-left:3px}
.dc .dd{font-size:10px;color:var(--t3);margin-top:5px}

/* STAT MATRIX */
.mtrx{display:grid;grid-template-columns:130px repeat(3,1fr);gap:1px;background:var(--border);border-radius:var(--r);overflow:hidden}
.mc{background:var(--bg-surface);padding:9px 12px}
.mc.hd{font-size:10px;color:var(--t3);font-weight:600;text-align:center}
.mc.lbl{font-size:11.5px;color:var(--t2)}
.sn{display:inline-flex;align-items:center;padding:2px 7px;border-radius:99px;font-size:11px;font-weight:700;white-space:nowrap}
.sn.r{background:rgba(25,128,56,.12);color:var(--green)}
.sn.d{background:rgba(15,98,254,.12);color:var(--blue)}
.sn.f{background:rgba(218,30,40,.12);color:var(--red)}

/* RESOURCE BARS */
.rb{margin-bottom:12px}
.rb:last-child{margin-bottom:0}
.rbl{display:flex;justify-content:space-between;margin-bottom:5px;font-size:11px}
.rbl span{color:var(--t2)}
.rbl strong{color:var(--t1)}
.rt{height:5px;background:var(--bg-hover);border-radius:99px;overflow:hidden}
.rf{height:100%;border-radius:99px;transition:width .5s}
.rf.n{background:var(--blue)}.rf.w{background:var(--yellow)}.rf.x{background:var(--red)}

/* TABLE */
.tbl{width:100%;border-collapse:collapse}
.tbl th{text-align:left;font-size:10px;font-weight:700;color:var(--t3);padding:9px 16px;border-bottom:1px solid var(--border);letter-spacing:.06em;text-transform:uppercase;white-space:nowrap}
.tbl td{padding:11px 16px;font-size:12.5px;color:var(--t1);border-bottom:1px solid var(--border)}
.tbl tr:last-child td{border-bottom:none}
.tbl tbody tr:hover td{background:rgba(0,0,0,.025)}

/* BADGES */
.bs{display:inline-flex;align-items:center;gap:4px;padding:2px 7px;border-radius:99px;font-size:10.5px;font-weight:600;white-space:nowrap}
.bs::before{content:'';width:5px;height:5px;border-radius:50%}
.bs.act{background:rgba(25,128,56,.1);color:var(--green)}.bs.act::before{background:var(--green)}
.bs.pnd{background:rgba(180,83,9,.1);color:var(--yellow)}.bs.pnd::before{background:var(--yellow)}
.bs.arc{background:rgba(141,141,141,.18);color:var(--t2)}.bs.arc::before{background:var(--t3)}
.bs.run{background:rgba(15,98,254,.1);color:var(--blue)}.bs.run::before{background:var(--blue);box-shadow:0 0 5px rgba(15,98,254,.4)}
.bs.fail{background:rgba(218,30,40,.1);color:var(--red)}.bs.fail::before{background:var(--red)}
.bs.stop{background:rgba(141,141,141,.18);color:var(--t2)}.bs.stop::before{background:var(--t3)}
.bs.ab{background:rgba(212,66,10,.1);color:var(--orange)}.bs.ab::before{background:var(--orange)}
.bs.crit{background:rgba(218,30,40,.1);color:var(--red)}.bs.crit::before{background:var(--red)}
.bs.info{background:rgba(15,98,254,.1);color:var(--blue)}.bs.info::before{background:var(--blue)}
.bp{display:inline-block;padding:2px 5px;border-radius:3px;font-size:10px;font-weight:700;letter-spacing:.04em}
.bp.pub{background:rgba(25,128,56,.12);color:var(--green)}
.bp.int{background:rgba(15,98,254,.12);color:var(--blue)}
.bp.con{background:rgba(180,83,9,.12);color:var(--yellow)}
.bp.res{background:rgba(218,30,40,.12);color:var(--red)}
.tt{display:inline-flex;align-items:center;gap:3px;padding:2px 7px;border-radius:var(--rs);font-size:11px;font-weight:500;background:var(--bg-hover);color:var(--t2)}

/* BUTTONS */
.btn-p{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;background:var(--blue);color:#fff;border:none;border-radius:var(--rs);font-size:12.5px;font-weight:600;cursor:pointer;transition:all .15s}
.btn-p:hover{background:#1555d6;transform:translateY(-1px);box-shadow:0 4px 12px rgba(26,107,255,.4)}
.btn-s{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;background:transparent;color:var(--t2);border:1px solid #C6C6C6;border-radius:var(--rs);font-size:12.5px;font-weight:600;cursor:pointer;transition:all .15s}
.btn-s:hover{background:var(--bg-hover);color:var(--t1);border-color:#A8A8A8}
/* aliases used by later screens */
.btn-pri{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;background:var(--blue);color:#fff;border:none;border-radius:var(--rs);font-size:12.5px;font-weight:600;cursor:pointer;transition:all .15s}
.btn-pri:hover{background:#1555d6;transform:translateY(-1px);box-shadow:0 4px 12px rgba(26,107,255,.4)}
.btn-sec{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;background:transparent;color:var(--t2);border:1px solid #C6C6C6;border-radius:var(--rs);font-size:12.5px;font-weight:600;cursor:pointer;transition:all .15s}
.btn-sec:hover{background:var(--bg-hover);color:var(--t1);border-color:#A8A8A8}
/* reusable card shell */
.card-plain{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--r)}
.al{display:inline-flex;align-items:center;padding:3px 8px;border-radius:var(--rs);font-size:11.5px;color:var(--t2);cursor:pointer;border:1px solid transparent;transition:all .15s}
.al:hover{background:var(--bg-hover);border-color:var(--border)}
.al.p{color:var(--blue-l)}.al.p:hover{background:var(--blue-s);border-color:var(--border-hi)}
.al.d:hover{background:rgba(255,71,87,.1);color:var(--red);border-color:rgba(255,71,87,.3)}

/* TOOLBAR */
.tb{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.fsel{padding:6px 10px;background:var(--bg-surface);border:1px solid var(--border);border-radius:var(--rs);color:var(--t2);font-size:11.5px;cursor:pointer}

/* PROGRESS */
.pb{height:4px;background:var(--bg-hover);border-radius:99px;overflow:hidden;width:80px}
.pf{height:100%;background:var(--blue);border-radius:99px}

/* WIZARD */
.wiz{display:flex;align-items:center;gap:0;margin-bottom:28px}
.wiz-s{display:flex;align-items:center;gap:8px;flex:1}
.wiz-s:last-child{flex:none}
.sc{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;background:var(--bg-hover);color:var(--t3);border:2px solid var(--border);transition:all .3s}
.sc.on{background:var(--blue);color:#fff;border-color:var(--blue);box-shadow:0 0 10px rgba(26,107,255,.5)}
.sc.ok{background:var(--green);color:#fff;border-color:var(--green)}
.sl{font-size:11.5px;color:var(--t2);white-space:nowrap}
.sl.on{color:var(--t1);font-weight:600}
.scon{flex:1;height:2px;background:var(--border);margin:0 6px}
.scon.ok{background:var(--green)}

/* FORM */
.fg{margin-bottom:16px}
.fl{font-size:11.5px;font-weight:600;color:var(--t2);margin-bottom:5px;display:block}
.fl .req{color:var(--red);margin-left:2px}
.fi{width:100%;padding:8px 11px;background:var(--bg-base);border:1px solid var(--border);border-radius:var(--rs);color:var(--t1);font-size:12.5px;transition:border-color .15s}
.fi:focus{outline:none;border-color:var(--blue)}
.fi::placeholder{color:var(--t3)}
.fsel2{width:100%;padding:8px 11px;background:var(--bg-base);border:1px solid var(--border);border-radius:var(--rs);color:var(--t1);font-size:12.5px;cursor:pointer}

/* UPLOAD ZONE */
.uz{border:2px dashed var(--border-hi);border-radius:var(--rl);padding:44px 28px;text-align:center;background:var(--blue-s);cursor:pointer;transition:all .2s}
.uz:hover{border-color:var(--blue);background:rgba(26,107,255,.18)}
.ui-icon{font-size:44px;margin-bottom:14px;display:block;opacity:.7}

/* TREE */
.tn{display:flex;align-items:center;gap:7px;padding:7px 10px;border-radius:var(--rs);cursor:pointer;font-size:12px;color:var(--t2);transition:all .15s}
.tn:hover{background:var(--bg-hover);color:var(--t1)}
.tn.sel{background:var(--blue-s);color:var(--blue-l)}
.tc{padding-left:22px}

/* TABS */
.tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:16px}
.tab{padding:9px 18px;font-size:12.5px;font-weight:500;color:var(--t2);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;white-space:nowrap}
.tab:hover{color:var(--t1)}
.tab.on{color:var(--blue-l);border-bottom-color:var(--blue)}

/* PERM MATRIX */
.pm{width:100%;border-collapse:collapse}
.pm th,.pm td{padding:9px 12px;font-size:11.5px;border-bottom:1px solid var(--border);text-align:left}
.pm th{color:var(--t3);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em}
.pm tbody tr:hover td{background:rgba(0,0,0,.02)}
.cb{width:16px;height:16px;border:2px solid var(--border-hi);border-radius:3px;display:inline-flex;align-items:center;justify-content:center;font-size:9px;color:#fff;transition:all .15s;cursor:pointer;margin:auto}
.cb.on{background:var(--blue);border-color:var(--blue)}

/* ANNOTATOR CHIP */
.ac{display:inline-flex;align-items:center;gap:3px;padding:2px 6px 2px 3px;background:var(--bg-hover);border-radius:99px;font-size:10.5px;color:var(--t2)}
.ma{width:14px;height:14px;border-radius:50%;background:linear-gradient(135deg,var(--purple),var(--blue));font-size:8px;color:#fff;font-weight:700;display:flex;align-items:center;justify-content:center}

/* MISC */
.row{display:flex;align-items:center;gap:16px}
.smr{display:flex;gap:20px;padding:14px 18px;background:var(--bg-surface);border-radius:var(--r);border:1px solid var(--border);margin-bottom:14px}
.si{text-align:center}
.sn2{font-size:22px;font-weight:800;color:var(--t1)}
.slb{font-size:10px;color:var(--t3);margin-top:2px}
.g2i{display:grid;grid-template-columns:1fr 300px;gap:14px}
.g2t{display:grid;grid-template-columns:260px 1fr;gap:14px}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>

<div id="root"></div>
<script type="text/babel">

const MENU=[

function Sidebar({cur,nav}){
  const [col,setCol]=useState(false);
  const [closed,setClosed]=useState(new Set());
  const [flyout,setFlyout]=useState(null);
  const ftimer=useRef(null);

  // pre-group menu
  const standalone=[],grouped=[];
  let cg=null;
  for(const m of MENU){
    if(m.sec){cg={sec:m.sec,i:m.i||'◱',items:[]};grouped.push(cg);}
    else if(cg) cg.items.push(m);
    else standalone.push(m);
  }

  const showFly=(sec,e)=>{
    clearTimeout(ftimer.current);
    const rect=e.currentTarget.getBoundingClientRect();
    const g=grouped.find(x=>x.sec===sec);
    setFlyout({sec,top:rect.top,items:g?.items||[]});
  };
  const hideFly=()=>{ftimer.current=setTimeout(()=>setFlyout(null),130);};
  const keepFly=()=>clearTimeout(ftimer.current);
  const toggleSec=sec=>setClosed(p=>{const n=new Set(p);n.has(sec)?n.delete(sec):n.add(sec);return n;});

  const W=col?56:220;
  return(
    <div className="sb" style={{width:W,minWidth:W,transition:'width .22s cubic-bezier(.4,0,.2,1)',overflow:'hidden',flexShrink:0,display:'flex',flexDirection:'column'}}>

      {/* ── Top bar: brand + toggle ── */}
      <div style={{height:56,display:'flex',alignItems:'center',borderBottom:'1px solid rgba(255,255,255,.08)',flexShrink:0,padding:col?'0':'0 10px 0 14px',gap:col?0:10,justifyContent:col?'center':'flex-start'}}>
        {!col&&<>
          <div className="logo-mark" style={{flexShrink:0}}>YF</div>
          <div style={{flex:1,minWidth:0}}><div className="logo-txt">延锋 SMP</div><div className="logo-sub">AI 小模型管理平台</div></div>
        </>}
        <button onClick={()=>setCol(p=>!p)} title={col?'展开菜单':'收起菜单'} style={{
          background:'rgba(255,255,255,.06)',border:'1px solid rgba(255,255,255,.1)',borderRadius:4,
          color:'#C6C6C6',cursor:'pointer',width:28,height:28,display:'flex',
          alignItems:'center',justifyContent:'center',fontSize:13,flexShrink:0}}>
          {col?'›':'‹'}
        </button>
      </div>

      {/* ── Nav ── */}
      <div style={{flex:1,overflowY:'auto',overflowX:'hidden',padding:'6px 0'}}>
        {/* standalone (工作台) */}
        {standalone.map((m,i)=>(
          <div key={i} className={`nav-item${cur===m.k?' on':''}`}
            title={col?m.l:undefined}
            style={{padding:col?'11px 0':'8px 16px',justifyContent:col?'center':'flex-start',gap:col?0:9}}
            onClick={()=>m.k&&nav(m.k)}>
            <span className="ni" style={{width:col?'100%':16,textAlign:'center'}}>{m.i}</span>
            {!col&&<span>{m.l}</span>}
          </div>
        ))}

        {/* sections */}
        {grouped.map(g=>(
          <div key={g.sec}>
            {col?(
              /* collapsed: one icon per section, hover → flyout */
              <div className={`nav-item${g.items.some(m=>m.k===cur)?' on':''}`}
                style={{padding:'11px 0',justifyContent:'center',gap:0}}
                title={g.sec}
                onMouseEnter={e=>showFly(g.sec,e)}
                onMouseLeave={hideFly}>
                <span className="ni" style={{width:'100%',textAlign:'center',fontSize:15}}>{g.i}</span>
              </div>
            ):(
              /* expanded: collapsible section */
              <>
                <div className="nav-lbl" onClick={()=>toggleSec(g.sec)}>
                  <span>{g.sec}</span>
                  <span className="sec-chev" style={{transform:closed.has(g.sec)?'rotate(-90deg)':'rotate(0)'}}>▾</span>
                </div>
                {!closed.has(g.sec)&&g.items.map((m,j)=>(
                  <div key={j} className={`nav-item${cur===m.k?' on':''}${m.dim?' dim':''}`}

                    onClick={()=>!m.dim&&m.k&&nav(m.k)}>
                    <span className="ni">{m.i}</span><span>{m.l}</span>
                  </div>
                ))}
              </>
            )}
          </div>
        ))}
      </div>

      {/* ── Storage (expanded only) ── */}
      {!col&&(
        <div style={{padding:'8px 14px',borderTop:'1px solid rgba(255,255,255,.08)'}}>
          <div style={{display:'flex',justifyContent:'space-between',fontSize:10,color:'#6F6F6F',marginBottom:5}}>

            onMouseLeave={e=>e.currentTarget.style.color='#6F6F6F'}>⚙</div>
        </>}
      </div>

      {/* ── Flyout panel (fixed, escapes overflow:hidden) ── */}
      {col&&flyout&&(
        <div onMouseEnter={keepFly} onMouseLeave={hideFly}
          style={{position:'fixed',left:56,top:flyout.top-4,minWidth:188,zIndex:2000,
            background:'#21272A',border:'1px solid rgba(255,255,255,.14)',

          <div style={{padding:'5px 16px 7px',fontSize:9,fontWeight:700,color:'#6F6F6F',
            letterSpacing:'.12em',textTransform:'uppercase',borderBottom:'1px solid rgba(255,255,255,.07)',marginBottom:3}}>
            {flyout.sec}
          </div>
          {flyout.items.map((m,i)=>(
            <div key={i} className={`nav-item${cur===m.k?' on':''}${m.dim?' dim':''}`}
              style={{padding:'8px 16px',whiteSpace:'nowrap'}}
              onClick={()=>{if(!m.dim&&m.k){nav(m.k);setFlyout(null);}}}>
              <span className="ni">{m.i}</span><span>{m.l}</span>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

        {(()=>{
          const months=['12月','1月','2月','3月','4月','5月'];
          const series=[
            {label:'数据集总量',color:'#0F62FE',vals:[1200,1450,1680,1890,2100,2340]},
            {label:'已标注数据集',color:'#198038',vals:[780,950,1100,1230,1420,1650]},
            {label:'新增数据集',color:'#FF832B',vals:[200,250,230,210,210,240],dash:true},
          ];
          const W=460,H=120,padL=36,padR=12,padT=10,padB=28;
          const allVals=series.flatMap(s=>s.vals);
          const minV=0,maxV=Math.max(...allVals)*1.08;
          const xs=months.map((_,i)=>padL+i*(W-padL-padR)/(months.length-1));
          const ys=v=>padT+(1-(v-minV)/(maxV-minV))*(H-padT-padB);
          const gridYs=[0,0.25,0.5,0.75,1].map(t=>padT+t*(H-padT-padB));
          return(
            <div>
              <svg width="100%" height={H} viewBox={`0 0 ${W} ${H}`} preserveAspectRatio="xMidYMid meet">
                {/* grid lines */}
                {gridYs.map((gy,i)=>(
                  <line key={i} x1={padL} y1={gy} x2={W-padR} y2={gy} stroke="var(--border)" strokeWidth="0.5"/>
                ))}
                {/* y-axis labels */}
                {[2500,1875,1250,625,0].map((v,i)=>(
                  <text key={i} x={padL-4} y={ys(v)+4} textAnchor="end" fontSize={8} fill="var(--fg-dim)">{v>=1000?`${(v/1000).toFixed(1)}k`:v}</text>
                ))}
                {/* series */}
                {series.map((s,si)=>{
                  const pts=s.vals.map((v,i)=>`${xs[i]},${ys(v)}`).join(' ');
                  return(
                    <g key={si}>
                      <polyline points={pts} fill="none" stroke={s.color} strokeWidth={s.dash?1.5:2} strokeDasharray={s.dash?'4 3':'none'}/>
                      {s.vals.map((v,i)=>(
                        <circle key={i} cx={xs[i]} cy={ys(v)} r={2.5} fill={s.color}/>
                      ))}
                    </g>
                  );
                })}
                {/* x-axis labels */}
                {months.map((m,i)=>(
                  <text key={i} x={xs[i]} y={H-6} textAnchor="middle" fontSize={9} fill="var(--fg-dim)">{m}</text>
                ))}
              </svg>
              {/* legend */}
              <div style={{display:'flex',gap:20,marginTop:8}}>
                {series.map(s=>(
                  <div key={s.label} style={{display:'flex',alignItems:'center',gap:6}}>
                    <svg width="20" height="8"><line x1="0" y1="4" x2="20" y2="4" stroke={s.color} strokeWidth={s.dash?1.5:2} strokeDasharray={s.dash?'4 3':'none'}/></svg>
                    <span style={{fontSize:11,color:'var(--fg-dim)'}}>{s.label}</span>
                  </div>
                ))}
              </div>
            </div>
          );
        })()}
      </div>
    </div>
  );
}

                <div style={{fontSize:40,marginBottom:16}}>✅</div>

              </div>
            ):(

                <div className="fg">

                  </select>
                </div>
                <div className="fg">
                  <label className="fl">名称</label>
                  <input className="fi" value={form.name} onChange={e=>setForm(p=>({...p,name:e.target.value}))} placeholder="例：生产数据库"/>
                </div>
                <div style={{display:'grid',gridTemplateColumns:'1fr 100px',gap:10}} className="fg">
                  <div>
                    <label className="fl">Host</label>
                    <input className="fi" value={form.host} onChange={e=>setForm(p=>({...p,host:e.target.value}))} placeholder="db.internal"/>
                  </div>
                  <div>
                    <label className="fl">端口</label>
                    <input className="fi" value={form.port} onChange={e=>setForm(p=>({...p,port:e.target.value}))}/>
                  </div>
                </div>
                <div className="fg">
                  <label className="fl">数据库/Bucket</label>
                  <input className="fi" value={form.db} onChange={e=>setForm(p=>({...p,db:e.target.value}))} placeholder="database name or bucket"/>
                </div>
                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}} className="fg">
                  <div>
                    <label className="fl">用户名</label>
                    <input className="fi" value={form.user} onChange={e=>setForm(p=>({...p,user:e.target.value}))} placeholder="username"/>
                  </div>
                  <div>
                    <label className="fl">密码</label>
                    <input className="fi" type="password" value={form.pwd} onChange={e=>setForm(p=>({...p,pwd:e.target.value}))} placeholder="••••••••"/>
                  </div>
                </div>
                {testResult==='ok'&&<div style={{padding:'8px 12px',background:'rgba(25,128,56,.1)',border:'1px solid rgba(25,128,56,.3)',borderRadius:6,fontSize:12,color:'var(--green)',marginBottom:14}}>✅ 连接成功</div>}
                {testResult==='fail'&&<div style={{padding:'8px 12px',background:'rgba(218,30,40,.1)',border:'1px solid rgba(218,30,40,.3)',borderRadius:6,fontSize:12,color:'var(--red)',marginBottom:14}}>❌ 连接失败</div>}
                <div style={{display:'flex',gap:8,marginTop:8}}>
                  <button className="btn-sec" style={{flex:1,justifyContent:'center'}} onClick={handleTest} disabled={testing}>
                    {testing?'测试中...':'测试连接'}
                  </button>
                  <button className="btn-pri" style={{flex:1,justifyContent:'center',opacity:testResult==='ok'?1:0.4,cursor:testResult==='ok'?'pointer':'not-allowed'}}
                    disabled={testResult!=='ok'} onClick={()=>setAddDone(true)}>
                    保存数据源
                  </button>
                </div>
              </>
            )}
          </div>
        </div>
      )}
    </div>
  );
}

    {ver:'v2.5',date:'2023-11-30',desc:'增加负样本 200 张',current:false},

          <div key={i} className={`tab${dsTab===i?' on':''}`} onClick={()=>setDsTab(i)}>

            </div>

              {DS_VERSIONS.map((v,i)=>(
                <div key={i} style={{padding:'14px 0',borderBottom:'1px solid var(--border)',display:'flex',alignItems:'center',gap:12}}>

        )}
      </div>}
      <div style={{marginTop:14,display:'flex',justifyContent:'flex-end'}}>
        <button className="btn-s" onClick={()=>nav('pipeline')}>→ 前往Pipeline编辑器</button>
      </div>
    </div>
  );
}

      )}
    </div>
  );
}

              <div style={{fontSize:12,color:'var(--fg)',lineHeight:1.7}}>
                {selAlert.lv==='critical'?'1. 立即通知值班工程师\n2. 检查相关资源使用情况\n3. 如为 OOM 则扩容或重启 Pod\n4. 在备注中记录处理过程':
                 selAlert.lv==='warning'?'1. 评估当前负载趋势\n2. 考虑预防性扩容\n3. 关注后续 30min 变化情况':
                 '记录信息供后续分析，无需立即干预。'}
              </div>
            </div>
            {/* handle notes */}
            {!(handleDone.has(selAlert.id))&&(
              <>
                <div style={{fontSize:12,fontWeight:600,color:'var(--fg)',marginBottom:6}}>处理备注</div>

                  <button className="btn-sec" style={{flex:1,justifyContent:'center'}} onClick={()=>setSelAlert(null)}>关闭</button>

                </div>
              </>
            )}
            {handleDone.has(selAlert.id)&&(
              <div style={{textAlign:'center',padding:'8px 0'}}>
                <span style={{fontSize:12,color:'var(--green)',fontWeight:600}}>✓ 该告警已处理</span>
                <div style={{marginTop:10}}><button className="btn-sec" onClick={()=>setSelAlert(null)}>关闭</button></div>
              </div>
            )}
          </div>
        </div>
      )}
      </>
      )}
    </div>
  );
}

                <div style={{fontSize:12,color:'var(--t3)',textAlign:'center',padding:'32px 0'}}>该分类暂无标签，点击上方按钮添加</div>
              )}
            </div>
          </div>
          {/* toast */}
          {tagToast&&(
            <div style={{position:'fixed',bottom:32,left:'50%',transform:'translateX(-50%)',background:'var(--green)',color:'#fff',padding:'9px 20px',borderRadius:8,fontSize:13,fontWeight:600,zIndex:9999,boxShadow:'0 4px 16px rgba(0,0,0,.2)'}}>{tagToast}</div>
          )}
        </div>
      ):null}
      {/* ── 新建API密钥弹窗 ── */}
      {newKeyOpen&&(
        <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.55)',zIndex:9999,display:'flex',alignItems:'center',justifyContent:'center'}} onClick={()=>setNewKeyOpen(false)}>
          <div style={{background:'var(--bg-card)',borderRadius:12,padding:28,width:460,boxShadow:'0 20px 60px rgba(0,0,0,.4)'}} onClick={e=>e.stopPropagation()}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}>
              <div style={{fontSize:15,fontWeight:700,color:'var(--fg)'}}>新建 API 密钥</div>
              <span onClick={()=>setNewKeyOpen(false)} style={{fontSize:20,color:'var(--t3)',cursor:'pointer',lineHeight:1}}>×</span>
            </div>
            {!keyResult?(
              <>
                <div style={{marginBottom:14}}>
                  <div style={{fontSize:12,fontWeight:600,color:'var(--fg)',marginBottom:5}}>密钥名称 <span style={{color:'var(--red)'}}>*</span></div>
                  <input value={keyForm.name} onChange={e=>setKeyForm(p=>({...p,name:e.target.value}))} placeholder="如 batch-inference-prod" style={{width:'100%',padding:'8px 10px',borderRadius:6,border:'1px solid var(--border)',background:'var(--bg-surface)',color:'var(--fg)',fontSize:12,outline:'none'}}/>
                </div>
                <div style={{marginBottom:20}}>
                  <div style={{fontSize:12,fontWeight:600,color:'var(--fg)',marginBottom:5}}>有效期</div>
                  <select value={keyForm.expiry} onChange={e=>setKeyForm(p=>({...p,expiry:e.target.value}))} style={{width:'100%',padding:'8px 10px',borderRadius:6,border:'1px solid var(--border)',background:'var(--bg-surface)',color:'var(--fg)',fontSize:12}}>
                    {[['30','30 天'],['90','90 天'],['180','180 天'],['365','1 年'],['0','永不过期']].map(([v,l])=><option key={v} value={v}>{l}</option>)}
                  </select>
                </div>
                <div style={{background:'rgba(212,66,10,.06)',borderRadius:6,padding:'10px 12px',border:'1px solid rgba(212,66,10,.2)',marginBottom:20,fontSize:11,color:'var(--orange)'}}>
                  ⚠ 密钥仅在创建时显示一次，请立即复制保存。丢失后需重新创建。
                </div>
                <div style={{display:'flex',gap:8}}>
                  <button className="btn-sec" style={{flex:1,justifyContent:'center'}} onClick={()=>setNewKeyOpen(false)}>取消</button>
                  <button onClick={()=>{if(keyForm.name)genKey();}} style={{flex:1,padding:'8px',background:keyForm.name?'var(--blue)':'var(--t3)',color:'#fff',border:'none',borderRadius:6,fontSize:13,fontWeight:600,cursor:keyForm.name?'pointer':'not-allowed'}}>生成密钥</button>
                </div>
              </>
            ):(
              <>
                <div style={{background:'#1E2229',borderRadius:8,padding:'16px 18px',marginBottom:16}}>
                  <div style={{fontSize:10,color:'#6F6F6F',marginBottom:8,letterSpacing:'.08em',textTransform:'uppercase'}}>你的新 API 密钥</div>
                  <div style={{fontFamily:'"Fira Code",monospace',fontSize:12,color:'#98C379',wordBreak:'break-all',lineHeight:1.6,marginBottom:12}}>{keyResult}</div>
                  <button onClick={copyKey} style={{padding:'5px 14px',background:copied?'var(--green)':'rgba(255,255,255,.1)',color:'#fff',border:'1px solid rgba(255,255,255,.15)',borderRadius:4,fontSize:11,cursor:'pointer',fontWeight:600}}>{copied?'✓ 已复制':'复制密钥'}</button>
                </div>
                <div style={{fontSize:11,color:'var(--fg-dim)',marginBottom:16,lineHeight:1.6}}>
                  名称：<span style={{fontWeight:600,color:'var(--fg)'}}>{keyForm.name}</span> · 有效期：<span style={{fontWeight:600,color:'var(--fg)'}}>{keyForm.expiry==='0'?'永不过期':keyForm.expiry+' 天'}</span>
                </div>
                <button className="btn-pri" style={{width:'100%',justifyContent:'center'}} onClick={()=>setNewKeyOpen(false)}>我已保存，关闭</button>
              </>
            )}
          </div>
        </div>
      )}
    </div>
  );
}

/* ── ANN WORK ── */
const BBOX=[
  {x:62,y:48,w:110,h:74,lbl:'焊接气孔',cls:0},
  {x:240,y:110,w:88,h:60,lbl:'裂纹',cls:1},
  {x:140,y:180,w:130,h:50,lbl:'夹渣',cls:2},
  {x:360,y:60,w:70,h:82,lbl:'未熔合',cls:3},
];
const CLS_CLR=['#FF6533','#1A6BFF','#10b981','#f59e0b'];
const THUMBS=[
  {id:'IMG-0023',done:true},{id:'IMG-0024',done:true},{id:'IMG-0025',done:false,cur:true},
  {id:'IMG-0026',done:false},{id:'IMG-0027',done:false},{id:'IMG-0028',done:false},
];
const CLASSES=['焊接气孔','裂纹','夹渣','未熔合'];
function AnnWork({nav}){
  const [sel,setSel]=useState(0);
  const [layers,setLayers]=useState({0:true,1:true,2:true,3:true});
  const [batchOpen,setBatchOpen]=useState(false);
  const [shortcutOpen,setShortcutOpen]=useState(false);
  const [timerSec]=useState(2843); // 47m 23s elapsed
  const [history,setHistory]=useState([['box1']]);
  const [histIdx,setHistIdx]=useState(0);
  const [imgIdx,setImgIdx]=useState(3);
  const [aiMode,setAiMode]=useState(false);
  const [aiAccepted,setAiAccepted]=useState({});
  const AI_BOXES=[
    {x:62,y:240,w:105,h:58,lbl:'焊接气孔',conf:0.91},
    {x:298,y:138,w:84,h:52,lbl:'裂纹',conf:0.78},
    {x:170,y:60,w:90,h:44,lbl:'未熔合',conf:0.65},
  ];
  const fmt=s=>`${String(Math.floor(s/3600)).padStart(2,'0')}:${String(Math.floor(s%3600/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;
  const toggleLayer=i=>setLayers(p=>({...p,[i]:!p[i]}));
  useEffect(()=>{
    const handler=(e)=>{
      if((e.ctrlKey||e.metaKey)&&e.key==='z'&&!e.shiftKey){setHistIdx(i=>Math.max(0,i-1));e.preventDefault();}
      if((e.ctrlKey||e.metaKey)&&(e.key==='y'||(e.key==='z'&&e.shiftKey))){setHistIdx(i=>Math.min(4,i+1));e.preventDefault();}
    };
    window.addEventListener('keydown',handler);
    return ()=>window.removeEventListener('keydown',handler);
  },[]);
  return(
    <div style={{display:'flex',flexDirection:'column',height:'calc(100vh - 56px)',overflow:'hidden'}}>
      {/* toolbar */}
      <div style={{display:'flex',alignItems:'center',gap:10,padding:'8px 16px',background:'var(--bg-card)',borderBottom:'1px solid var(--border)',flexShrink:0}}>
        <button className="btn-sec" style={{fontSize:12,padding:'4px 10px'}} onClick={()=>nav('ann')}>← 返回</button>
        <span style={{fontSize:12,color:'var(--fg-dim)'}}>焊接缺陷标注 v3 · <span style={{color:'var(--blue)'}}>进行中</span></span>
        {/* timer */}
        <div style={{display:'flex',alignItems:'center',gap:5,padding:'3px 10px',background:'rgba(0,0,0,.06)',borderRadius:4,fontSize:11,fontFamily:'monospace',color:'var(--fg-dim)'}}>
          <span style={{color:'#10b981',fontSize:9}}>●</span>{fmt(timerSec)} <span style={{opacity:.5}}>/ ~60m</span>
        </div>
        {/* undo/redo */}
        <div style={{display:'flex',alignItems:'center',gap:4,marginLeft:'auto'}}>
          <button onClick={()=>setHistIdx(i=>Math.max(0,i-1))} disabled={histIdx===0} title="撤销 (Ctrl+Z)"
            style={{width:26,height:26,borderRadius:4,border:'1px solid var(--border)',background:'transparent',color:histIdx===0?'var(--t3)':'var(--fg-dim)',fontSize:14,cursor:histIdx===0?'not-allowed':'pointer',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>↩</button>
          <button onClick={()=>setHistIdx(i=>Math.min(history.length-1,i+1))} disabled={histIdx>=history.length-1} title="重做 (Ctrl+Y)"
            style={{width:26,height:26,borderRadius:4,border:'1px solid var(--border)',background:'transparent',color:histIdx>=history.length-1?'var(--t3)':'var(--fg-dim)',fontSize:14,cursor:histIdx>=history.length-1?'not-allowed':'pointer',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>↪</button>
          <span style={{fontSize:10,color:'var(--t3)',whiteSpace:'nowrap'}}>操作 {histIdx+1}/{history.length}</span>
        </div>
        <button onClick={()=>setShortcutOpen(true)} style={{width:24,height:24,borderRadius:'50%',border:'1.5px solid var(--border)',background:'transparent',color:'var(--fg-dim)',fontSize:13,fontWeight:700,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}} title="快捷键参考">?</button>
        <button onClick={()=>setAiMode(v=>!v)} style={{padding:'4px 12px',fontSize:12,borderRadius:6,border:`1px solid ${aiMode?'#8B5CF6':'var(--border)'}`,background:aiMode?'rgba(139,92,246,.15)':'transparent',color:aiMode?'#8B5CF6':'var(--fg-dim)',cursor:'pointer',fontWeight:aiMode?600:400,transition:'all .2s'}}>✦ AI 辅助{aiMode?'  ON':''}</button>
        <button className="btn-sec" style={{fontSize:12,padding:'4px 12px'}} onClick={()=>setImgIdx(i=>Math.max(1,i-1))}>上一张 ←</button>

        <button className="btn-sec" style={{fontSize:12,padding:'4px 12px'}} onClick={()=>setImgIdx(i=>Math.min(48,i+1))}>下一张 →</button>
        <button className="btn-sec" style={{fontSize:12,padding:'4px 12px'}} onClick={()=>setBatchOpen(true)}>批量提交 (3)</button>
        <button className="btn-pri" style={{fontSize:12,padding:'4px 14px'}}>保存标注</button>
      </div>
      {/* batch submit modal */}

        <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.5)',zIndex:9999,display:'flex',alignItems:'center',justifyContent:'center'}} onClick={()=>setBatchOpen(false)}>
          <div style={{background:'var(--bg-card)',borderRadius:12,padding:24,width:400,boxShadow:'0 20px 60px rgba(0,0,0,.4)'}} onClick={e=>e.stopPropagation()}>
            <div style={{fontSize:15,fontWeight:700,marginBottom:16}}>批量提交标注</div>
            {['IMG-0023','IMG-0024','IMG-0025'].map((img,i)=>(
              <div key={i} style={{display:'flex',alignItems:'center',gap:10,padding:'8px 0',borderBottom:'1px solid var(--border)'}}>
                <div style={{width:40,height:30,background:'#1a2236',borderRadius:3}}/>

                  <div style={{fontSize:12,fontWeight:500}}>{img}</div>
                  <div style={{fontSize:10,color:'var(--fg-dim)'}}>{[3,2,4][i]} 个标注框</div>
                </div>

              </div>
            ))}
            <div style={{display:'flex',gap:8,marginTop:16}}>
              <button className="btn-sec" style={{flex:1,justifyContent:'center'}} onClick={()=>setBatchOpen(false)}>取消</button>
              <button className="btn-pri" style={{flex:1,justifyContent:'center',background:'var(--green)'}} onClick={()=>setBatchOpen(false)}>确认提交 (3张)</button>
            </div>
          </div>
        </div>
      )}
      <div style={{display:'flex',flex:1,overflow:'hidden'}}>
        {/* thumb list */}
        <div style={{width:120,background:'var(--bg-nav)',borderRight:'1px solid rgba(255,255,255,.08)',overflowY:'auto',flexShrink:0}}>
          {THUMBS.map((t)=>(
            <div key={t.id} style={{
              padding:'8px',borderBottom:'1px solid rgba(255,255,255,.06)',cursor:'pointer',
              background:t.cur?'rgba(26,107,255,0.15)':'transparent',
              borderLeft:t.cur?'3px solid var(--blue)':'3px solid transparent'
            }}>
              <div style={{width:'100%',aspectRatio:'4/3',background:'#1a2236',borderRadius:4,marginBottom:5,position:'relative',overflow:'hidden'}}>
                <div style={{position:'absolute',inset:0,background:'linear-gradient(135deg,#1a2236 0%,#243050 50%,#1a2236 100%)',opacity:0.8}}/>
                {t.done&&<div style={{position:'absolute',bottom:3,right:3,width:8,height:8,borderRadius:'50%',background:'#10b981'}}/>}
              </div>
              <div style={{fontSize:9.5,color:t.cur?'#78A9FF':'#8D8D8D',textAlign:'center'}}>{t.id}</div>
            </div>
          ))}
        </div>
        {/* canvas */}
        <div style={{flex:1,background:'#0d1117',display:'flex',alignItems:'center',justifyContent:'center',position:'relative',overflow:'hidden'}}>
          <svg width={520} height={340} style={{display:'block'}}>
            {/* mock industrial image background */}
            <defs>
              <linearGradient id="imgbg" x1="0" y1="0" x2="1" y2="1">
                <stop offset="0%" stopColor="#1c2840"/>
                <stop offset="50%" stopColor="#243050"/>
                <stop offset="100%" stopColor="#1a2236"/>
              </linearGradient>
              <filter id="noise"><feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/><feColorMatrix type="saturate" values="0"/><feBlend in="SourceGraphic" mode="multiply"/></filter>
            </defs>
            <rect width={520} height={340} fill="url(#imgbg)"/>

            <line x1="0" y1="170" x2="520" y2="170" stroke="#1e2f48" strokeWidth="16"/>
            <line x1="0" y1="170" x2="520" y2="168" stroke="#2c3f5c" strokeWidth="4" strokeDasharray="8 4"/>
            {/* texture marks */}
            {[60,140,210,300,380,450].map((x,i)=><circle key={i} cx={x} cy={158+((i%3)*8)} r={3+i%2} fill="#16253a" opacity="0.7"/>)}
            {/* bboxes */}
            {BBOX.map((b,i)=>(
              <g key={i} onClick={()=>setSel(i)} style={{cursor:'pointer'}}>
                <rect x={b.x} y={b.y} width={b.w} height={b.h}
                  fill={`${CLS_CLR[b.cls]}18`} stroke={CLS_CLR[b.cls]}

                {sel===i&&[[b.x,b.y],[b.x+b.w,b.y],[b.x,b.y+b.h],[b.x+b.w,b.y+b.h]].map(([cx,cy],j)=>(
                  <rect key={j} x={cx-4} y={cy-4} width={8} height={8} fill="#fff" stroke={CLS_CLR[b.cls]} strokeWidth="1.5" rx="1"/>

            {aiMode&&AI_BOXES.map((b,i)=>(

          <div style={{margin:'14px 0',height:1,background:'rgba(255,255,255,.1)'}}/>
          <div style={{fontSize:12,fontWeight:600,marginBottom:10,color:'#F4F4F4'}}>当前框属性</div>
          {sel!==null?(
            <div style={{fontSize:11,color:'#A8A8A8',lineHeight:2}}>
              <div>类别：<span style={{color:CLS_CLR[BBOX[sel].cls]}}>{BBOX[sel].lbl}</span></div>
              <div>坐标：({BBOX[sel].x}, {BBOX[sel].y})</div>
              <div>尺寸：{BBOX[sel].w} × {BBOX[sel].h}</div>
              <div>置信度：<span style={{color:'#78A9FF'}}>手动</span></div>
            </div>
          ):<div style={{fontSize:11,color:'#6F6F6F'}}>点击框体选中</div>}
          <div style={{margin:'14px 0',height:1,background:'rgba(255,255,255,.1)'}}/>
          <div style={{fontSize:12,fontWeight:600,marginBottom:8,color:'#F4F4F4'}}>图层可见性</div>
          {CLASSES.map((c,i)=>(
            <div key={c} style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:6}}>
              <div style={{display:'flex',alignItems:'center',gap:6}}>
                <div style={{width:8,height:8,borderRadius:2,background:CLS_CLR[i]}}/>
                <span style={{fontSize:11,color:'#C6C6C6'}}>{c}</span>
              </div>
              <div onClick={()=>toggleLayer(i)} style={{width:28,height:16,borderRadius:8,background:layers[i]?CLS_CLR[i]:'rgba(255,255,255,.12)',position:'relative',cursor:'pointer',transition:'background .2s'}}>
                <div style={{position:'absolute',width:10,height:10,borderRadius:'50%',background:'#fff',top:3,left:layers[i]?15:3,transition:'left .2s'}}/>

          <div style={{margin:'14px 0',height:1,background:'rgba(255,255,255,.1)'}}/>
          <div style={{fontSize:12,fontWeight:600,marginBottom:8,color:'#F4F4F4'}}>快捷键</div>
          {[['1-4','切换类别'],['W','矩形框'],['E','椭圆框'],['D','删除所选'],['Ctrl+Z','撤销'],['Space','下一张'],['Alt+S','批量提交']].map(([k,v])=>(

            <div>审核通过率：<span style={{color:'#A8A8A8'}}>96.3%</span></div>

                  </div>
                  <div style={{fontSize:10,color:'#6F6F6F',marginBottom:6}}>({b.x},{b.y}) {b.w}×{b.h}</div>
                  {aiAccepted[i]?(

function SparkLoss({vals}){
  if(!vals)return<span style={{color:'var(--fg-dim)',fontSize:11}}>—</span>;
  const W=60,H=22,mn=Math.min(...vals),mx=Math.max(...vals),r=mx-mn||1;
  const pts=vals.map((v,i)=>`${(i/(vals.length-1))*W},${H-2-(H-4)*((v-mn)/r)}`).join(' ');
  return<svg width={W} height={H}><polyline points={pts} fill="none" stroke="var(--blue)" strokeWidth="1.5"/></svg>;
}
function ExpCmpChart({seqs,ids,W=480,H=130}){
  const allVals=Object.values(seqs).flat();
  const mn=Math.min(...allVals),mx=Math.max(...allVals),r=mx-mn||1;
  const COLORS=['var(--blue)','var(--orange)'];
  const toPath=vals=>{
    const len=vals.length;
    return vals.map((v,i)=>`${(i/(len-1))*W},${H-(H-6)*((v-mn)/r)}`).join(' ');
  };
  return(
    <svg viewBox={`0 0 ${W} ${H+20}`} width="100%" height={H+20} style={{display:'block'}}>
      <defs>
        {ids.map((id,ci)=>(
          <linearGradient key={id} id={`cg${ci}`} x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stopColor={COLORS[ci]} stopOpacity="0.15"/>
            <stop offset="100%" stopColor={COLORS[ci]} stopOpacity="0"/>
          </linearGradient>
        ))}
      </defs>
      {/* y-axis ticks */}
      {[mn,mn+r/2,mx].map((v,i)=>(
        <text key={i} x={0} y={H-(H-6)*((v-mn)/r)+4} fontSize={9} fill="var(--t3)">{v.toFixed(2)}</text>
      ))}
      {ids.map((id,ci)=>{
        const vals=seqs[id];if(!vals)return null;
        const pts=toPath(vals);
        const fillPts=`18,${H} ${pts} ${18+(vals.length-1)/(vals.length-1)*(W-18)},${H}`;
        return(
          <g key={id} transform="translate(24,0)">
            <polygon points={`0,${H} ${pts} ${(vals.length-1)/(vals.length-1)*(W-24)},${H}`} fill={`url(#cg${ci})`}/>
            <polyline points={pts} fill="none" stroke={COLORS[ci]} strokeWidth="2" strokeLinejoin="round"/>
            {vals.map((v,i)=>i===vals.length-1&&(
              <circle key={i} cx={(i/(vals.length-1))*(W-24)} cy={H-(H-6)*((v-mn)/r)} r={3} fill={COLORS[ci]}/>
            ))}
          </g>
        );
      })}
      {/* x labels */}
      {ids[0]&&seqs[ids[0]]&&seqs[ids[0]].map((_,i)=>{
        const vals=seqs[ids[0]];
        return(
          <text key={i} x={24+(i/(vals.length-1))*(W-24)} y={H+16} fontSize={9} textAnchor="middle" fill="var(--t3)">Ep{i+1}</text>
        );
      })}
    </svg>
  );
}

function scl(d,mn,mx,W,H){const P=6,n=d.length,r=mx-mn||1;return d.map((v,i)=>[+(P+(i/(n-1))*(W-2*P)).toFixed(1),+(P+(H-2*P)*(1-(v-mn)/r)).toFixed(1)]);}
function pl(pts){return pts.map(([x,y])=>`${x},${y}`).join(' ');}
function ar(pts,W,H){return`6,${H-6} ${pl(pts)} ${W-6},${H-6}`;}
function MiniChart({d1,d2,mn,mx,W=320,H=100,c1='#1A6BFF',c2='#FF6533',label1,label2}){
  const p1=scl(d1,mn,mx,W,H),p2=scl(d2,mn,mx,W,H);
  const ticks=d1.map((_,i)=>`Ep${i+1}`);
  return(
    <div style={{position:'relative'}}>
      <svg width={W} height={H} style={{display:'block'}}>
        <defs>
          <linearGradient id={`g1${c1.replace('#','')}`} x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stopColor={c1} stopOpacity="0.25"/>
            <stop offset="100%" stopColor={c1} stopOpacity="0.02"/>
          </linearGradient>
        </defs>
        <polygon points={ar(p1,W,H)} fill={`url(#g1${c1.replace('#','')})`}/>
        <polyline points={pl(p1)} fill="none" stroke={c1} strokeWidth="2"/>
        <polyline points={pl(p2)} fill="none" stroke={c2} strokeWidth="2" strokeDasharray="4 2"/>
        {p1.map(([x,y],i)=><circle key={i} cx={x} cy={y} r="2.5" fill={c1}/>)}
      </svg>
      <div style={{display:'flex',gap:12,marginTop:4,fontSize:11,color:'var(--fg-dim)'}}>
        <span style={{color:c1}}>── {label1}</span>
        <span style={{color:c2}}>- - {label2}</span>
      </div>
    </div>
  );
}

                  <div style={{fontSize:12,fontWeight:600,marginBottom:10}}>流量分配</div>

                </div>
                <div style={{marginBottom:14}}>
                  <div style={{fontSize:12,fontWeight:600,marginBottom:5}}>实验时长</div>
                  <select value={abDuration} onChange={e=>setAbDuration(e.target.value)} style={{width:'100%',padding:'8px 10px',borderRadius:6,border:'1px solid var(--border)',background:'var(--bg-surface)',color:'var(--fg)',fontSize:12}}>

                <div style={{marginBottom:20}}>
                  <div style={{fontSize:12,fontWeight:600,marginBottom:8}}>评估指标</div>

                        <span style={{color:'#fff',fontSize:10,fontWeight:700}}>✓</span>
                      </div>
                      <span style={{fontSize:12,color:'var(--fg)'}}>{m}</span>
                    </div>
                  ))}
                </div>
                <button onClick={()=>setAbDone(true)} style={{width:'100%',padding:'9px',background:'var(--blue)',color:'#fff',border:'none',borderRadius:6,fontSize:13,fontWeight:600,cursor:'pointer'}}>启动实验</button>
              </>
            )}
          </div>
        </div>
      )}
      {/* ── 新建批量任务弹窗 ── */}
      {batchOpen&&(
        <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.55)',zIndex:9999,display:'flex',alignItems:'center',justifyContent:'center'}} onClick={()=>setBatchOpen(false)}>
          <div style={{background:'var(--bg-card)',borderRadius:12,padding:28,width:460,boxShadow:'0 20px 60px rgba(0,0,0,.4)'}} onClick={e=>e.stopPropagation()}>
            {batchDone?(
              <div style={{textAlign:'center',padding:'20px 0'}}>
                <div style={{fontSize:36,marginBottom:12}}>✅</div>
                <div style={{fontSize:15,fontWeight:700,color:'var(--green)',marginBottom:8}}>批量任务已创建</div>
                <div style={{fontSize:12,color:'var(--fg-dim)',marginBottom:20}}>任务「{batchForm.name}」已加入批量推理队列</div>
                <button className="btn-pri" style={{padding:'7px 24px'}} onClick={()=>setBatchOpen(false)}>完成</button>
              </div>
            ):(
              <>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}>
                  <div style={{fontSize:15,fontWeight:700}}>新建批量推理任务</div>
                  <span onClick={()=>setBatchOpen(false)} style={{fontSize:20,color:'var(--t3)',cursor:'pointer',lineHeight:1}}>×</span>
                </div>
                <div style={{marginBottom:14}}>
                  <div style={{fontSize:12,fontWeight:600,marginBottom:5}}>任务名称</div>
                  <input value={batchForm.name} onChange={e=>setBatchForm(p=>({...p,name:e.target.value}))} placeholder="如 PCB批量检测-20240115" style={{width:'100%',padding:'8px 10px',borderRadius:6,border:'1px solid var(--border)',background:'var(--bg-surface)',color:'var(--fg)',fontSize:12,outline:'none'}}/>
                </div>
                <div style={{marginBottom:14}}>
                  <div style={{fontSize:12,fontWeight:600,marginBottom:5}}>选择模型</div>
                  <select value={batchForm.model} onChange={e=>setBatchForm(p=>({...p,model:e.target.value}))} style={{width:'100%',padding:'8px 10px',borderRadius:6,border:'1px solid var(--border)',background:'var(--bg-surface)',color:'var(--fg)',fontSize:12}}>
                    {['焊缝检测-v3','PCB检测-v2','管道检测-v1','表面缺陷-v2'].map(m=><option key={m}>{m}</option>)}
                  </select>
                </div>
                <div style={{marginBottom:14}}>
                  <div style={{fontSize:12,fontWeight:600,marginBottom:5}}>数据源路径</div>
                  <input value={batchForm.src} onChange={e=>setBatchForm(p=>({...p,src:e.target.value}))} placeholder="如 /data/images/batch_001/" style={{width:'100%',padding:'8px 10px',borderRadius:6,border:'1px solid var(--border)',background:'var(--bg-surface)',color:'var(--fg)',fontSize:12,outline:'none'}}/>

                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:20}}>
                  <div>
                    <div style={{fontSize:12,fontWeight:600,marginBottom:5}}>并发数</div>
                    <select value={batchForm.concurrency} onChange={e=>setBatchForm(p=>({...p,concurrency:e.target.value}))} style={{width:'100%',padding:'8px 10px',borderRadius:6,border:'1px solid var(--border)',background:'var(--bg-surface)',color:'var(--fg)',fontSize:12}}>
                      {['1','2','4','8'].map(v=><option key={v}>{v}</option>)}

                  </div>
                  <div>
                    <div style={{fontSize:12,fontWeight:600,marginBottom:5}}>输出格式</div>

                <div style={{display:'flex',gap:0,marginBottom:20,marginTop:8}}>
                  {['选择模型','服务配置','确认'].map((s,i)=>(

                      <div style={{fontSize:10,color:i===deployStep?'var(--blue)':'var(--t3)',fontWeight:i===deployStep?600:400}}>{s}</div>
                      {i<2&&<div style={{position:'absolute',top:12,left:'50%',width:'100%',height:1,background:i<deployStep?'var(--blue)':'var(--border)',zIndex:-1}}/>}
                    </div>
                  ))}
                </div>
                {/* step 0: model select */}
                {deployStep===0&&(
                  <div>
                    <div style={{fontSize:12,fontWeight:600,color:'var(--fg)',marginBottom:10}}>选择模型</div>

                      <div key={m} onClick={()=>setDeployForm(p=>({...p,model:m,version:v}))} style={{padding:'12px 14px',borderRadius:7,border:`1.5px solid ${deployForm.model===m?'var(--blue)':'var(--border)'}`,marginBottom:8,cursor:'pointer',background:deployForm.model===m?'rgba(15,98,254,.06)':'',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                        <div>
                          <div style={{fontSize:12.5,fontWeight:600,color:deployForm.model===m?'var(--blue)':'var(--fg)'}}>{m}</div>
                          <div style={{fontSize:10.5,color:'var(--fg-dim)',marginTop:2}}>{t} · {v}</div>
                        </div>
                        {deployForm.model===m&&<span style={{color:'var(--blue)',fontSize:16}}>✓</span>}
                      </div>
                    ))}
                  </div>
                )}
                {/* step 1: config */}
                {deployStep===1&&(
                  <div>
                    <div style={{marginBottom:14}}>
                      <div style={{fontSize:12,fontWeight:600,color:'var(--fg)',marginBottom:5}}>服务名称 <span style={{color:'var(--red)'}}>*</span></div>
                      <input value={deployForm.name} onChange={e=>setDeployForm(p=>({...p,name:e.target.value}))} placeholder="如 resnet50-weld-prod" style={{width:'100%',padding:'8px 10px',borderRadius:6,border:'1px solid var(--border)',background:'var(--bg-surface)',color:'var(--fg)',fontSize:12,outline:'none'}}/>
                    </div>
                    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:14}}>
                      <div>
                        <div style={{fontSize:12,fontWeight:600,color:'var(--fg)',marginBottom:5}}>初始副本数</div>
                        <select value={deployForm.replicas} onChange={e=>setDeployForm(p=>({...p,replicas:e.target.value}))} style={{width:'100%',padding:'8px 10px',borderRadius:6,border:'1px solid var(--border)',background:'var(--bg-surface)',color:'var(--fg)',fontSize:12}}>
                          {['1','2','4','8'].map(o=><option key={o}>{o}</option>)}
                        </select>
                      </div>
                      <div>
                        <div style={{fontSize:12,fontWeight:600,color:'var(--fg)',marginBottom:5}}>资源规格</div>
                        <select value={deployForm.resource} onChange={e=>setDeployForm(p=>({...p,resource:e.target.value}))} style={{width:'100%',padding:'8px 10px',borderRadius:6,border:'1px solid var(--border)',background:'var(--bg-surface)',color:'var(--fg)',fontSize:12}}>
                          {['CPU-4c8g','GPU-small (T4)','GPU-large (A100)'].map(o=><option key={o}>{o}</option>)}
                        </select>
                      </div>
                    </div>
                    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
                      {[{l:'HPA 最小副本',k:'minR'},{l:'HPA 最大副本',k:'maxR'}].map(f=>(
                        <div key={f.k}>
                          <div style={{fontSize:12,fontWeight:600,color:'var(--fg)',marginBottom:5}}>{f.l}</div>
                          <input value={deployForm[f.k]} onChange={e=>setDeployForm(p=>({...p,[f.k]:e.target.value}))} style={{width:'100%',padding:'8px 10px',borderRadius:6,border:'1px solid var(--border)',background:'var(--bg-surface)',color:'var(--fg)',fontSize:12,outline:'none'}}/>
                        </div>
                      ))}
                    </div>
                  </div>
                )}
                {/* step 2: confirm */}
                {deployStep===2&&(
                  <div style={{background:'var(--bg-surface)',borderRadius:8,padding:'14px 16px',border:'1px solid var(--border)'}}>
                    <div style={{fontSize:12,fontWeight:600,color:'var(--fg)',marginBottom:10}}>部署摘要</div>
                    {[['模型',deployForm.model],['版本',deployForm.version],['服务名称',deployForm.name||'（未填）'],['副本数',deployForm.replicas],['资源规格',deployForm.resource],['HPA 范围',`${deployForm.minR} ~ ${deployForm.maxR}`]].map(([k,v])=>(
                      <div key={k} style={{display:'flex',justifyContent:'space-between',padding:'6px 0',borderBottom:'1px solid var(--border)',fontSize:12}}>
                        <span style={{color:'var(--fg-dim)'}}>{k}</span><span style={{fontWeight:600,color:'var(--fg)'}}>{v}</span>
                      </div>
                    ))}
                  </div>
                )}
                <div style={{display:'flex',gap:8,marginTop:20}}>
                  <button className="btn-sec" style={{flex:1,justifyContent:'center'}} onClick={()=>deployStep>0?setDeployStep(p=>p-1):setDeployOpen(false)}>{deployStep>0?'上一步':'取消'}</button>
                  <button onClick={()=>deployStep<2?setDeployStep(p=>p+1):(deployForm.name&&setDeployDone(true))} style={{flex:1,padding:'8px',background:(deployStep===2&&!deployForm.name)?'var(--t3)':'var(--blue)',color:'#fff',border:'none',borderRadius:6,fontSize:13,fontWeight:600,cursor:'pointer'}}>{deployStep<2?'下一步':'确认部署'}</button>
                </div>
              </>
            )}
          </div>
        </div>
      )}
      {/* ── 健康检查弹窗 ── */}
      {healthCheckSvc&&(
        <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.5)',zIndex:9999,display:'flex',alignItems:'center',justifyContent:'center'}} onClick={()=>setHealthCheckSvc('')}>
          <div style={{background:'var(--bg-card)',borderRadius:12,padding:28,width:380,boxShadow:'0 20px 60px rgba(0,0,0,.4)'}} onClick={e=>e.stopPropagation()}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}>
              <div style={{fontSize:14,fontWeight:700,color:'var(--fg)'}}>健康检测 — {healthCheckSvc}</div>
              <span onClick={()=>setHealthCheckSvc('')} style={{fontSize:20,color:'var(--t3)',cursor:'pointer',lineHeight:1}}>×</span>
            </div>
            {healthLoading?(
              <div style={{textAlign:'center',padding:'24px 0'}}>
                <div style={{width:32,height:32,border:'3px solid var(--border)',borderTopColor:'var(--blue)',borderRadius:'50%',animation:'spin 0.8s linear infinite',margin:'0 auto 14px'}}/>
                <div style={{fontSize:13,color:'var(--fg-dim)'}}>正在探测...</div>
              </div>
            ):(
              healthDone&&(
                <div style={{display:'flex',flexDirection:'column',gap:10}}>
                  {[
                    ['端点可达性','✅ 正常（HTTP 200）'],
                    ['推理延迟','✅ 23ms（P99: 87ms）'],
                    ['GPU 利用率','✅ 45%'],
                    ['队列积压','✅ 0 个待处理请求'],
                    ['内存使用','✅ 2.3GB / 8GB'],
                  ].map(([label,val])=>(
                    <div key={label} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'10px 14px',background:'var(--bg-surface)',borderRadius:6,fontSize:13}}>
                      <span style={{color:'var(--fg-dim)'}}>{label}</span>
                      <span style={{color:'var(--fg)',fontWeight:500}}>{val}</span>
                    </div>
                  ))}
                  <button onClick={()=>setHealthCheckSvc('')} style={{marginTop:8,padding:'9px',background:'var(--blue)',color:'#fff',border:'none',borderRadius:6,fontSize:13,fontWeight:600,cursor:'pointer'}}>关闭</button>
                </div>
              )
            )}
          </div>
        </div>
      )}
    </div>
  );
}
